// ============================================================ the replay
el('replay').addEventListener('pointerdown', function(e){ e.preventDefault(); endReplay(); });
// A knockout is worth watching twice. Every rendered frame we snapshot the
// transform of every animated bone into a ring buffer; on a KO we stop the
// sim and play those frames back through a set of cinema cameras. It's a real
// replay — the bodies do exactly what they just did, we only move the lens.
const REC = { nodes:[], buf:[], size:300, count:0, koFrame:-1, stride:0 };
function nodeList(f){
  return [ f.group, f.body, f.torso, f.head, f.hips, f.shoulders[0], f.shoulders[1],
    f.gloveL, f.gloveR,
    f.armL.up, f.armL.fore, f.armL.elb, f.armR.up, f.armR.fore, f.armR.elb,
    f.legs[0].thigh, f.legs[0].shin, f.legs[0].boot,
    f.legs[1].thigh, f.legs[1].shin, f.legs[1].boot ];
}
function recInit(){
  REC.nodes = nodeList(P).concat(nodeList(F));
  REC.stride = REC.nodes.length * 10;          // pos3 + quat4 + scale3
  // the squish lives in shader uniforms, not transforms, so it rides along in
  // its own lane: amount + centre + direction per dentable surface
  REC.defs = [
    { m:P.head, d:P.dHead, f:P }, { m:P.gloveL, d:P.dGL, f:P }, { m:P.gloveR, d:P.dGR, f:P },
    { m:F.head, d:F.dHead, f:F }, { m:F.gloveL, d:F.dGL, f:F }, { m:F.gloveR, d:F.dGR, f:F }
  ];
  REC.buf = []; REC.ext = [];
  for(let i=0;i<REC.size;i++){
    REC.buf.push(new Float32Array(REC.stride));
    REC.ext.push(new Float32Array(REC.defs.length * 7));
  }
  REC.count = 0; REC.koFrame = -1;
}
function recFrame(){
  const a = REC.buf[REC.count % REC.size];
  let k = 0;
  for(let i=0;i<REC.nodes.length;i++){
    const n = REC.nodes[i];
    a[k++]=n.position.x; a[k++]=n.position.y; a[k++]=n.position.z;
    a[k++]=n.quaternion.x; a[k++]=n.quaternion.y; a[k++]=n.quaternion.z; a[k++]=n.quaternion.w;
    a[k++]=n.scale.x; a[k++]=n.scale.y; a[k++]=n.scale.z;
  }
  const e = REC.ext[REC.count % REC.size];
  let j = 0;
  for(let i=0;i<REC.defs.length;i++){
    const d = REC.defs[i].d;
    e[j++]=d.a; e[j++]=d.p.x; e[j++]=d.p.y; e[j++]=d.p.z;
    e[j++]=d.n.x; e[j++]=d.n.y; e[j++]=d.n.z;
  }
  REC.count++;
}
const _q0 = new THREE.Quaternion(), _q1 = new THREE.Quaternion();
function frameAt(n){
  const lo = Math.max(0, REC.count - REC.size), hi = REC.count - 1;
  return REC.buf[clamp(Math.round(n), lo, hi) % REC.size];
}
function extAt(n){
  const lo = Math.max(0, REC.count - REC.size), hi = REC.count - 1;
  return REC.ext[clamp(Math.round(n), lo, hi) % REC.size];
}
function applyFrame(fr){
  const f0 = Math.floor(fr), t = fr - f0;
  const A = frameAt(f0), B = frameAt(f0 + 1);
  let k = 0;
  for(let i=0;i<REC.nodes.length;i++){
    const n = REC.nodes[i];
    n.position.set(A[k]+(B[k]-A[k])*t, A[k+1]+(B[k+1]-A[k+1])*t, A[k+2]+(B[k+2]-A[k+2])*t); k+=3;
    _q0.set(A[k],A[k+1],A[k+2],A[k+3]); _q1.set(B[k],B[k+1],B[k+2],B[k+3]);
    n.quaternion.copy(_q0).slerp(_q1, t); k+=4;
    n.scale.set(A[k]+(B[k]-A[k])*t, A[k+1]+(B[k+1]-A[k+1])*t, A[k+2]+(B[k+2]-A[k+2])*t); k+=3;
  }
  // and the squish — the face was already caved in at 4x slow, so replay it
  const EA = extAt(f0), EB = extAt(f0 + 1);
  for(let i=0;i<REC.defs.length;i++){
    const R = REC.defs[i], j = i*7;
    const u = R.m.material.userData.u;
    if(!u) continue;
    const s = R.f.group.scale.x || 1;
    u.uDentA.value = (EA[j] + (EB[j]-EA[j])*t) / s;
    u.uDentP.value.set(EA[j+1], EA[j+2], EA[j+3]);
    u.uDentN.value.set(EA[j+4], EA[j+5], EA[j+6]);
  }
  P.group.updateMatrixWorld(true); F.group.updateMatrixWorld(true);
}

// windows are in recorded frames relative to the punch; rate is playback speed
const ANGLES = [
  { name:'BROADCAST',  sub:'the shot that did it', a:-52, b:16,  rate:0.62, fov:44 },
  { name:'THE MOMENT', sub:'contact',              a:-9,  b:15,  rate:0.26, fov:32 },
  { name:'CANVAS CAM', sub:'down he goes',         a:4,   b:66,  rate:0.62, fov:58 },
  { name:'AFTERMATH',  sub:'no count needed',      a:38,  b:132, rate:1.00, fov:48 }
];
const RP = { on:false, i:0, fr:0, loser:null, winner:null, done:null, burst:false, orbit:0 };
const _lh = new V3(), _wh = new V3(), _dir = new V3(), _side = new V3(), _mid = new V3();

function startReplay(loser, winner, done){
  // if the tape is somehow empty, don't stall the night — go straight on
  if(REC.koFrame < 0 || REC.count < 8){ if(done) done(); return; }
  RP.on = true; RP.i = -1; RP.loser = loser; RP.winner = winner; RP.done = done;
  RP.orbit = Math.random()*Math.PI*2;
  state = S.REPLAY;
  reachRing.visible = false;
  // the live sparks belong to a moment we're about to rewind past
  for(let i=0;i<parts.length;i++){ parts[i].life = 0; parts[i].m.visible = false; }
  for(let i=0;i<rings.length;i++){ rings[i].life = 0; rings[i].m.visible = false; }
  el('hud').style.opacity = 0;
  el('replay').classList.add('on');
  nextAngle();
}
function nextAngle(){
  RP.i++;
  if(RP.i >= ANGLES.length){ endReplay(); return; }
  const A = ANGLES[RP.i];
  RP.fr = REC.koFrame + A.a;
  RP.burst = false;
  el('rpName').textContent = A.name;
  el('rpSub').textContent = A.sub;
  el('rpNum').textContent = (RP.i+1) + ' / ' + ANGLES.length;
  const bar = el('rpBar');
  bar.style.transition = 'none'; bar.style.transform = 'scaleX(0)';
  requestAnimationFrame(function(){
    const secs = ((A.b - A.a) / A.rate) / 60;
    bar.style.transition = 'transform ' + secs + 's linear';
    bar.style.transform = 'scaleX(1)';
  });
  el('rpCut').classList.remove('flash'); void el('rpCut').offsetWidth;
  el('rpCut').classList.add('flash');
  tone(1200, 700, 0.05, 'square', 0.03);
}
function endReplay(){
  if(!RP.on) return;
  RP.on = false;
  // must leave S.REPLAY or the loop keeps calling replayTick with no angle left
  state = S.READY;
  reachRing.visible = true;
  el('hud').style.opacity = 1;
  el('replay').classList.remove('on');
  const fn = RP.done; RP.done = null;
  if(fn) fn();
}
function replayTick(raw){
  const A = ANGLES[RP.i];
  const bMax = REC.count - 1 - REC.koFrame;
  const bEnd = REC.koFrame + Math.min(A.b, bMax);
  applyFrame(RP.fr);

  // heads in world space, read back off the replayed skeleton
  RP.loser.head.getWorldPosition(_lh);
  RP.winner.head.getWorldPosition(_wh);
  _dir.subVectors(_lh, _wh).setY(0);
  if(_dir.lengthSq() < 1e-6) _dir.set(0,0,1);
  _dir.normalize();
  _side.set(-_dir.z, 0, _dir.x);
  _mid.addVectors(_lh, _wh).multiplyScalar(0.5);

  const span = Math.max(1, bEnd - (REC.koFrame + A.a));
  const k = clamp((RP.fr - (REC.koFrame + A.a)) / span, 0, 1);

  if(RP.i === 0){            // broadcast: side on, slow push in
    camPos.copy(_mid).addScaledVector(_side, 3.5 - k*0.5).add(new V3(0, 2.05 - k*0.15, 0));
    camLook.copy(_mid); camLook.y = 1.45;
  } else if(RP.i === 1){     // the moment: tight, compressed, drifting
    camPos.copy(_lh).addScaledVector(_side, 0.95 + k*0.12).addScaledVector(_dir, -0.34)
      .add(new V3(0, 0.06 + k*0.05, 0));
    camLook.copy(_lh);
  } else if(RP.i === 2){     // canvas cam: down at his level, looking up
    camPos.copy(_lh).addScaledVector(_dir, 1.5).addScaledVector(_side, -0.85 - k*0.3);
    camPos.y = 0.30;
    camLook.copy(_lh); camLook.y = Math.max(0.35, _lh.y);
  } else {                   // aftermath: slow orbit on the man on the floor
    const ang = RP.orbit + k*1.15;
    camPos.set(_lh.x + Math.cos(ang)*2.5, 1.15 + k*0.75, _lh.z + Math.sin(ang)*2.5);
    camLook.copy(_lh); camLook.y = 0.6;
  }
  camera.position.copy(camPos);
  camera.lookAt(camLook);
  camera.fov += (A.fov - camera.fov) * Math.min(1, raw*9);
  camera.updateProjectionMatrix();

  // re-fire the impact exactly where it happened, once per angle
  if(!RP.burst && RP.fr >= REC.koFrame){
    RP.burst = true;
    burst(_lh, 22, K.lemon, 5);
    shockRing(_lh, K.lemon, 1.4);
    impactFrames(RP.i === 1 ? 4 : 2, 0xFFF6E3, 0x0A0610);   // longer on the tight angle
    popStar(_lh, 1.1, 0xFFE03D, 0.42);
    powText(_lh, 'upper', 76, '#FFE03D');
    POST.uniforms.uFlash.value = 0.30;
    POST.uniforms.uFlashCol.value.setHex(K.bone);
    POST.uniforms.uAber.value = 0.010;
    bulbStorm(14);
    sfxHit(0.8);
  }

  RP.fr += A.rate;
  if(RP.fr >= bEnd) nextAngle();
}
function applySpec(sp){
  AI.sp = sp;
  F.mirror = !!sp.mirror;
  F.spec = sp;
  F.mats.skin.color.setHex(sp.skin);
  F.mats.headMat.color.setHex(sp.skin);          // cloned for its dent uniforms
  F.mats.trunk.color.setHex(sp.trunk);
  F.mats.gl.color.setHex(sp.glove);
  F.mats.gloveMats.forEach(function(m){ m.color.setHex(sp.glove); });
  F.mats.boot.color.setHex(sp.boot);
  F.group.scale.setScalar(sp.scale);
  F.torso.scale.set(sp.bulk, 1 + (sp.bulk-1)*0.4, sp.bulk);
  G.foeMax = G.foeHP = sp.hp;
  el('foeName').textContent = sp.name;
  el('foeRec').textContent = sp.rec + ' · ' + sp.style.toUpperCase();
  document.documentElement.style.setProperty('--accent', sp.accent);
  drawPips();
}
function drawPips(){
  const m = M();
  if(m.pick){ el('pips').innerHTML = ''; return; }
  // survival has no end, so the pips become a streak counter instead of a card
  const n = m.endless ? Math.max(8, RUN.bout+2) : ROSTER.length;
  let h = '';
  for(let i=0;i<n;i++){
    const cls = i < RUN.bout ? 'pip won' : (i === RUN.bout ? 'pip now' : 'pip');
    h += '<i class="' + cls + '"></i>';
  }
  el('pips').innerHTML = h;
}

function startBout(){
  audioInit();
  if(actx && actx.state === 'suspended') actx.resume();
  applySpec(curSpec());
  G.combo = 0; G.comboT = 0; G.meter = Math.min(G.meter, 40);
  G.lastPunch = ''; G.landed = 0; G.thrown = 0;
  G.counter = 0; G.invuln = 0; G.weave = 0;
  G.blocking = false; BLOCK.key = BLOCK.touch = BLOCK.pad = false;
  G.hitstop = 0; G.slow = 0; G.trauma = 0;
  SUPER.on = false; SUPER.queue.length = 0;
  G.t0 = performance.now();
  P.pos.set(0,0,1.1); F.pos.set(0,0,-1.1);
  P.yaw = 0; F.yaw = Math.PI;
  P.punch = null; F.punch = null;
  P.dead = false; P.group.rotation.set(0,0,0); P.group.position.y = 0;
  P.rag = null; F.rag = null;
  [P,F].forEach(function(f){
    f.body.position.set(0,0,0); f.body.rotation.set(0,0,0);
    f.armL.bias.set(0,0,0); f.armR.bias.set(0,0,0);
    f.shoulders[0].position.set(-0.40,1.52,0); f.shoulders[1].position.set(0.40,1.52,0);
    f.hips.position.set(0,0.76,0); f.hips.rotation.set(0,0,0); f.hips.scale.set(1,1,1);
    f.torso.position.set(0,1.24,0); f.torso.rotation.set(0,0,0);
    f.head.rotation.set(0,0,0);
  });
  const _sp = curSpec();
  F.torso.scale.set(_sp.bulk, 1+(_sp.bulk-1)*0.4, _sp.bulk);
  P.torso.scale.set(1,1,1);
  [P,F].forEach(function(f){
    [f.dHead, f.dGL, f.dGR].forEach(function(d){ d.a=0; d.v=0; d.t=0; });
    f.mats.headMat.emissiveIntensity = 0;
  });
  REC.koFrame = -1;
  F.dead = false; F.stagger = 0; F.hurt = 0;
  F.group.rotation.set(0,Math.PI,0); F.group.position.y = 0;
  F.torso.rotation.set(0,0,0); F.head.position.set(0,1.80,-0.02);
  F.mats.skin.emissiveIntensity = 0;
  resetFeet(P); resetFeet(F);
  AI.phase = 'idle'; AI.t = 1.0; AI.circleT = 0; AI.chain = 0; AI.block = 0;
  AI.stepIn = 0; AI.forceAttack = false; AI.punchName = '';
  UI.combo.style.opacity = 0; UI.shout.style.opacity = 0; UI.shout.style.fontSize = '40px';
  UI.veil.classList.add('hide');

}

P.pos.set(0,0,1.1); F.pos.set(0,0,-1.1); F.yaw = Math.PI;
applySpec(ROSTER[0]);
resetFeet(P); resetFeet(F);
recInit();
applySquish();
setBars();
titleCard();

// ============================================================ loop
const clock = new THREE.Clock();
let camRoll = 0, T = 0;
const camPos = new V3(0, 1.9, 3), camLook = new V3(0, 1.5, 0);
const fwd = new V3(), rgt = new V3();

function faceEachOther(){
  const dx = F.pos.x - P.pos.x, dz = F.pos.z - P.pos.z;
  P.yaw = Math.atan2(-dx, -dz);
  F.yaw = Math.atan2(dx, dz);
}

function animate(){
  requestAnimationFrame(animate);
  const raw = Math.min(clock.getDelta(), 0.05);
  T += raw;
  POST.uniforms.uTime.value = T;
  padTick();                 // polled before the replay bail-out so A/skip work

  if(paused){
    renderer.setRenderTarget(rt); renderer.clear(); renderer.render(scene, camera);
    renderer.setRenderTarget(null); renderer.render(postScene, postCam);
    return;
  }

  // ---------- replay owns the bodies and the lens; sim stands down ----------
  if(state === S.REPLAY){
    replayTick(raw);
    fxTick(raw);
    postTick(raw);
    renderer.setRenderTarget(rt);
    renderer.clear();
    renderer.render(scene, camera);
    renderer.setRenderTarget(null);
    renderer.render(postScene, postCam);
    return;
  }

  if(G.slow > 0) G.slow -= raw;
  let dt = raw * (G.slow > 0 ? 0.28 : 1);
  if(G.hitstop > 0){ G.hitstop -= raw; dt = 0; }

  if(G.comboT > 0){ G.comboT -= raw; if(G.comboT <= 0){ G.combo = 0; G.lastPunch=''; UI.combo.style.opacity = 0; } }
  if(G.counter > 0) G.counter -= raw;
  if(G.invuln > 0) G.invuln -= raw;
  if(G.weave > 0) G.weave -= raw;
  if(shoutT > 0){
    shoutT -= raw;
    const k = Math.max(0, shoutT/0.9);
    UI.shout.style.opacity = Math.min(1, k*2.4);
    UI.shout.style.transform = 'translateX(-50%) scale(' + (1+k*0.35) + ') skewX(-9deg)';
  }

  // ---------- movement ----------
  readKeys();
  let pMoving = false;
  if(state === S.FIGHT && dt > 0){
    faceEachOther();
    fwd.set(-Math.sin(P.yaw), 0, -Math.cos(P.yaw));   // player's forward = at the foe
    rgt.set(-fwd.z, 0, fwd.x);
    const sp = 2.05 * (G.blocking ? 0.5 : 1) * (P.punch ? 0.55 : 1);
    if((move.x || move.z) && !SUPER.on){    // a flurry commits you
      P.pos.addScaledVector(fwd, move.z*sp*dt);
      P.pos.addScaledVector(rgt, move.x*sp*dt*0.9);
      pMoving = true;
    }
    aiUpdate(dt);
  }
  // weave shifts you sideways too — it's an evasion, not a dance
  const wv = G.weave > 0 ? Math.sin((1 - G.weave/0.42)*Math.PI) : 0;
  if(wv > 0 && state === S.FIGHT){
    fwd.set(-Math.sin(P.yaw), 0, -Math.cos(P.yaw));
    rgt.set(-fwd.z, 0, fwd.x);
    P.pos.addScaledVector(rgt, G.weaveDir * wv * 1.5 * raw);
  }
  // ring bounds + no walking through each other
  [P, F].forEach(function(f){
    f.pos.x = clamp(f.pos.x, -RING, RING);
    f.pos.z = clamp(f.pos.z, -RING, RING);
  });
  {
    const dx = F.pos.x - P.pos.x, dz = F.pos.z - P.pos.z;
    const d = Math.hypot(dx,dz) || 0.001;
    if(d < 0.92){
      const push = (0.92 - d)/2, nx = dx/d, nz = dz/d;
      F.pos.x += nx*push; F.pos.z += nz*push;
      P.pos.x -= nx*push; P.pos.z -= nz*push;
    }
  }
  if(state === S.FIGHT) superTick(dt);
  faceEachOther();
  P.group.position.set(P.pos.x, P.group.position.y, P.pos.z); P.group.rotation.y = P.yaw;
  if(!F.dead){ F.group.position.set(F.pos.x, 0, F.pos.z); F.group.rotation.y = F.yaw; }

  // ---------- punches ----------
  [P, F].forEach(function(f){
    if(!f.punch) return;
    const pk = f.punch;
    pk.t += dt / pk.mv.dur;
    if(!pk.done && pk.t >= pk.mv.hit){ pk.done = true; if(pk.cb) pk.cb(); }
    if(pk.t >= 1) f.punch = null;
  });

  // ---------- pose ----------
  // Split in two: every body is posed first, THEN contacts are resolved against
  // the real geometry, THEN the arms are solved so they follow the glove to
  // where it actually stopped rather than where the punch wished it went.
  function poseBody(f, isPlayer){
    // weight shift: lean onto whichever foot is planted, bob with the step
    const stepPhase = f.legs[0].stepT < 1 ? f.legs[0].stepT : (f.legs[1].stepT < 1 ? f.legs[1].stepT : -1);
    const stepping = stepPhase >= 0;
    const targetSway = stepping ? (f.legs[0].stepT < 1 ? 0.05 : -0.05) : 0;
    f.sway += (targetSway - f.sway) * Math.min(1, raw*6);

    const bob = Math.sin(T*(isPlayer?3.4:2.8) + (isPlayer?0:1.7)) * 0.022;
    f.body.position.y = bob - (stepping ? Math.sin(stepPhase*Math.PI)*0.018 : 0);
    f.body.position.x = f.sway;
    f.body.rotation.y = Math.sin(T*(isPlayer?1.6:1.2))*0.05 + f.sway*0.5;

    const blocking = isPlayer ? G.blocking : foeBlocking();
    const gl = f.gloveL, gr = f.gloveR;
    let tl = f.guardL.clone(), tr = f.guardR.clone();
    tl.y += bob*1.4; tr.y += bob*1.4;
    tl.x += f.sway; tr.x += f.sway;
    if(blocking){ tl.set(-0.20,1.70,-0.34); tr.set(0.22,1.70,-0.32); f.body.rotation.x = 0.08; }
    else f.body.rotation.x = 0;

    if(!isPlayer && AI.phase === 'wind' && AI.punchName){
      const w = 1 - Math.max(0, AI.t/Math.max(AI.wind,0.001));
      if(sideOf(f, MOVES[AI.punchName]) === 'L'){ tl.z += 0.24*w; tl.x -= 0.1*w; }
      else { tr.z += 0.24*w; tr.x += 0.1*w; }
    }

    let side = '';
    if(f.punch){
      const pk = f.punch;
      // re-aim every frame at where his head IS, not where it was when the
      // punch left. otherwise a man who steps while you're mid-punch gets hit
      // by a glove pointed at his memory.
      pk.target.copy(punchTarget(f, pk.mv));
      const p = pathPos(f, pk.mv, Math.min(pk.t,1), pk.target);
      side = sideOf(f, pk.mv);
      if(side === 'L') tl.copy(p); else tr.copy(p);
      const e = Math.sin(Math.min(pk.t,1)*Math.PI);
      // turn INTO the punch — the throwing shoulder comes forward. the old
      // sign rotated it away, which the stretchy stick-arm quietly hid.
      f.body.rotation.y += (side === 'L' ? -0.30 : 0.34)*e;
      f.body.position.z = -0.30*e;
      f.body.rotation.x = (pk.mv.arc === 'upper' ? -0.16 : 0.10)*e;
    } else f.body.position.z = 0;

    // the throwing hand snaps to its path; the idle hand eases
    const k = Math.min(1, dt*22);
    if(side === 'L') gl.position.copy(tl); else gl.position.lerp(tl, k);
    if(side === 'R') gr.position.copy(tr); else gr.position.lerp(tr, k);

    if(f.stagger > 0){ f.stagger -= raw; f.body.rotation.z = Math.sin(f.stagger*70)*0.10; }
    else {
      f.body.rotation.z = 0;
      f.head.position.z += (-0.02 - f.head.position.z) * Math.min(1, raw*8);
      f.head.position.y += (1.80 - f.head.position.y) * Math.min(1, raw*8);
      f.torso.rotation.x += (0 - f.torso.rotation.x) * Math.min(1, raw*8);
    }
    if(f.hurt > 0){
      f.hurt -= raw*5;
      const e = Math.max(0, f.hurt)*0.9;
      f.mats.skin.emissive.setHex(0xFF2D55); f.mats.skin.emissiveIntensity = e;
      f.mats.headMat.emissive.setHex(0xFF2D55); f.mats.headMat.emissiveIntensity = e;
    }
    f.body.updateMatrix();
  }
  function poseLimbs(f, moving){
    f.body.updateMatrix();          // arms hang off the torso, so it has to be current
    solveArm(f, 'L');
    solveArm(f, 'R');
    updateFeet(f, dt, moving);
    solveLegs(f);
  }
  const fMoving = state === S.FIGHT;
  if(!P.rag) poseBody(P, true);
  if(!F.rag) poseBody(F, false);
  resolveContacts();          // gloves stop on skin before the arms are solved
  squishTick(raw);
  if(P.rag){ ragTick(P, F, dt); ragApply(P); } else { poseLimbs(P, pMoving); avoidBones(P,'L',F); avoidBones(P,'R',F); }
  if(F.rag){ ragTick(F, P, dt); ragApply(F); } else { poseLimbs(F, fMoving); avoidBones(F,'L',P); avoidBones(F,'R',P); }

  // (no scripted fall — a ragdoll has the body from the moment he's out)
  // lean from the waist — tilting the whole rig would rip the planted feet off the canvas
  P.body.rotation.z = -G.weaveDir*wv*0.26;
  P.body.rotation.y += G.weaveDir*wv*0.10;

  // ---------- particles ----------
  fxTick(raw);

  // ---------- reach ring ----------
  reachRing.visible = true;
  reachRing.position.set(P.pos.x, 0.015, P.pos.z);
  const d = gap();
  const inRange = d <= MOVES.jab.range;
  reachRing.material.color.setHex(inRange ? K.lemon : K.bone);
  reachRing.material.opacity = inRange ? 0.20 : 0.06;
  if(state === S.FIGHT){
    UI.rngV.textContent = d < MOVES.upper.range ? 'INSIDE' : (inRange ? 'JAB' : 'OUT');
    UI.rng.classList.toggle('far', !inRange);
  }

  // ---------- camera rig: over the player's shoulder, wherever he is ----------
  fwd.set(-Math.sin(P.yaw), 0, -Math.cos(P.yaw));
  rgt.set(-fwd.z, 0, fwd.x);
  const tr = G.trauma; G.trauma = Math.max(0, G.trauma - raw*2.0);
  const sh = tr*tr;
  camPos.copy(P.pos)
    .addScaledVector(fwd, -1.22)
    .addScaledVector(rgt, 0.64);
  camPos.y = 1.92;
  camPos.x += (Math.random()-.5)*sh*0.44;
  camPos.y += (Math.random()-.5)*sh*0.40;
  camPos.z += (Math.random()-.5)*sh*0.44;
  camLook.copy(P.pos)
    .addScaledVector(fwd, Math.min(d, 2.6)*0.85 + 0.5)
    .addScaledVector(rgt, -0.06);
  camLook.y = 1.52 - Math.min(d,3)*0.02;
  if(state === S.KO){ camLook.copy(F.pos); camLook.y = 0.9; }
  camLook.x += (Math.random()-.5)*sh*0.18;
  camLook.y += (Math.random()-.5)*sh*0.16;
  camera.position.lerp(camPos, Math.min(1, raw*14));
  camera.lookAt(camLook);
  camRoll += ((-G.weaveDir*wv*0.13) - camRoll) * Math.min(1, raw*10);
  camera.rotation.z += camRoll + (Math.random()-.5)*sh*0.06;
  const wantFov = 56 - (G.counter>0?5:0) - (SUPER.on?6:0) + sh*3;
  camera.fov += (wantFov - camera.fov) * Math.min(1, raw*6);
  camera.updateProjectionMatrix();

  // ---------- post decay ----------
  postTick(raw);
  const sh2 = G.trauma*G.trauma;
  rimA.intensity = 2.4 + Math.sin(T*9)*0.3 + G.combo*0.06;
  rimB.intensity = 1.9 + Math.cos(T*7)*0.3 + G.combo*0.05;
  rimC.intensity = 1.4 + (G.meter/G.meterMax)*1.6;
  shaft.material.opacity = 0.045 + sh2*0.05;

  // every frame goes in the tape — a KO is worth watching twice
  if(state === S.FIGHT || state === S.KO || state === S.DOWN) recFrame();

  renderer.setRenderTarget(rt);
  renderer.clear();
  renderer.render(scene, camera);
  renderer.setRenderTarget(null);
  renderer.render(postScene, postCam);
}

// shared by the live loop and the replay ---------------------------------
function fxTick(raw){
  starTick(raw);
  for(let i=0;i<parts.length;i++){
    const p = parts[i];
    if(p.life <= 0) continue;
    p.life -= raw;
    if(p.life <= 0){ p.m.visible = false; continue; }
    p.m.position.addScaledVector(p.v, raw);
    p.v.y -= 9*raw; p.v.multiplyScalar(1 - raw*2.2);
    p.m.material.opacity = Math.min(1, p.life/p.max*1.6);
    p.m.quaternion.copy(camera.quaternion);
    p.m.rotateZ(p.spin);
  }
  for(let i=0;i<rings.length;i++){
    const r = rings[i];
    if(r.life <= 0) continue;
    r.life -= raw*2.6;
    if(r.life <= 0){ r.m.visible = false; continue; }
    r.m.scale.setScalar((0.3 + (1-r.life)*3.2) * (r.m.userData.s||1));
    r.m.material.opacity = r.life*0.85;
    r.m.quaternion.copy(camera.quaternion);
  }
  crowdTick(raw);
  if(Math.random() < (state === S.FIGHT ? 0.09 : 0.05)) popBulb();
  for(let i=0;i<bulbs.length;i++){
    const b = bulbs[i];
    if(b.life <= 0) continue;
    b.life -= raw*4.5;
    if(b.life <= 0){ b.sp.material.opacity = 0; b.sp.scale.setScalar(0); continue; }
    b.sp.material.opacity = b.life;
    b.sp.scale.setScalar(0.25 + (1-b.life)*1.5);
  }
}
function postTick(raw){
  const U = POST.uniforms;
  // counted down per rendered frame, so hit stop and slow-mo can't stretch it
  U.uImpact.value = IMP.frames > 0 ? 1 : 0;
  if(IMP.frames > 0) IMP.frames--;
  U.uAber.value  += (0 - U.uAber.value)  * Math.min(1, raw*7);
  U.uZoom.value  += (0 - U.uZoom.value)  * Math.min(1, raw*6);
  U.uFlash.value += (0 - U.uFlash.value) * Math.min(1, raw*9);
  U.uGlitch.value+= (0 - U.uGlitch.value)* Math.min(1, raw*11);
  if(U.uShock.value > 0){ U.uShock.value += raw*2.4; if(U.uShock.value >= 1) U.uShock.value = 0; }
  const satWant = 1 + Math.min(0.7, G.combo*0.035) + (SUPER.on?0.5:0) + (RP.on?0.25:0);
  U.uSat.value += (satWant - U.uSat.value) * Math.min(1, raw*4);
  U.uAber.value = Math.max(U.uAber.value, Math.min(0.004, G.combo*0.0002));
}
animate();
})();
</script>
