<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>Glass Jaw</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#08060E">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Glass Jaw">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --void:#08060E; --bone:#FFF6E3; --lemon:#FFE03D;
    --blood:#FF2D55; --violet:#8B3BFF; --cyan:#25E5FF;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;overflow:hidden;background:#000;}
  body{font-family:'DM Mono',ui-monospace,monospace;color:var(--bone);
    -webkit-tap-highlight-color:transparent;touch-action:none;user-select:none;
    -webkit-user-select:none;}

  /* the whole game lives in here — when the device is portrait this gets
     rotated 90deg, so the game is landscape no matter how you hold it */
  #app{position:fixed;left:50%;top:50%;transform-origin:50% 50%;
    transform:translate(-50%,-50%);overflow:hidden;background:#000;}
  #stage{position:absolute;inset:0;}
  canvas{display:block;width:100%;height:100%;}

  /* ---------------- HUD ---------------- */
  #hud{position:absolute;inset:0;pointer-events:none;}
  #vig{position:absolute;inset:0;box-shadow:inset 0 0 190px 34px rgba(0,0,0,.85);}
  #tint{position:absolute;inset:0;opacity:0;}

  #foe{position:absolute;top:20px;left:50%;transform:translateX(-50%);width:min(520px,44%);}
  #foe .name{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px;}
  #foe .name h2{font-family:'Anton',sans-serif;font-size:17px;letter-spacing:.16em;
    transform:skewX(-9deg);text-transform:uppercase;}
  #foe .name span{font-size:9px;letter-spacing:.2em;opacity:.55;text-transform:uppercase;}
  .bar{height:12px;background:rgba(255,246,227,.09);transform:skewX(-16deg);
    border:1px solid rgba(255,246,227,.22);overflow:hidden;position:relative;}
  .bar i{position:absolute;inset:0;transform-origin:left;display:block;}
  #foeGhost{background:var(--bone);opacity:.34;transition:transform .5s cubic-bezier(.2,.9,.2,1) .18s;}
  #foeFill{background:linear-gradient(90deg,var(--blood),var(--lemon));}
  #foeFill.low{background:linear-gradient(90deg,var(--blood),#fff);animation:panic .35s infinite;}
  @keyframes panic{50%{filter:brightness(1.9);}}

  #me{position:absolute;left:20px;top:20px;width:170px;}
  #me .lab,#super .lab{font-size:8.5px;letter-spacing:.22em;opacity:.6;margin-bottom:5px;text-transform:uppercase;}
  #meFill{background:linear-gradient(90deg,var(--cyan),var(--bone));}

  #super{position:absolute;right:20px;top:20px;width:170px;text-align:right;}
  #superFill{background:linear-gradient(90deg,var(--violet),var(--cyan));}
  #super.ready .lab{opacity:1;color:var(--lemon);animation:blink .5s steps(2) infinite;}
  #super.ready #superFill{background:linear-gradient(90deg,var(--lemon),#fff);}
  #super.ready .bar{border-color:var(--lemon);box-shadow:0 0 22px rgba(255,224,61,.7);}
  @keyframes blink{50%{opacity:.25;}}

  /* range readout — tells you if you can actually reach him */
  #rng{position:absolute;left:50%;bottom:16px;transform:translateX(-50%);
    font-size:9px;letter-spacing:.22em;text-transform:uppercase;opacity:.5;white-space:nowrap;}
  #rng b{font-weight:500;color:var(--lemon);}
  #rng.far b{color:var(--blood);}

  #combo{position:absolute;right:4%;top:34%;text-align:right;opacity:0;transform-origin:100% 50%;}
  #combo b{font-family:'Anton',sans-serif;font-size:82px;line-height:.8;display:block;
    transform:skewX(-11deg);color:var(--bone);
    text-shadow:5px 5px 0 var(--blood), 9px 9px 0 rgba(139,59,255,.55);}
  #combo i{font-family:'Anton',sans-serif;font-style:normal;font-size:19px;letter-spacing:.2em;
    display:block;transform:skewX(-11deg);color:var(--lemon);margin-top:2px;}
  #combo.pop{animation:pop .38s cubic-bezier(.16,1.5,.3,1);}
  @keyframes pop{0%{transform:scale(1.9) skewX(6deg);}100%{transform:scale(1) skewX(0);}}

  #shout{position:absolute;left:50%;top:20%;transform:translateX(-50%);
    font-family:'Anton',sans-serif;font-size:40px;letter-spacing:.06em;opacity:0;
    text-transform:uppercase;white-space:nowrap;}

  #dmg{position:absolute;inset:0;overflow:hidden;}
  .num{position:absolute;font-family:'Anton',sans-serif;font-size:28px;
    transform:skewX(-8deg);text-shadow:2px 3px 0 rgba(0,0,0,.65);will-change:transform,opacity;}
  @keyframes rise{
    0%{transform:translate(-50%,0) scale(1.6) skewX(-8deg);opacity:1;}
    18%{transform:translate(-50%,-13px) scale(1) skewX(-8deg);opacity:1;}
    100%{transform:translate(-50%,-84px) scale(.85) skewX(-8deg);opacity:0;}
  }

  /* ---------------- overlay ---------------- */
  #veil{position:absolute;inset:0;display:grid;place-items:center;text-align:center;padding:18px;
    background:radial-gradient(110% 80% at 50% 50%, rgba(20,6,30,.74), rgba(4,2,8,.96));z-index:5;}
  #veil.hide{display:none;}
  .card{max-width:660px;}
  /* no vw/vh anywhere inside #app — when the app is CSS-rotated those units
     still measure the real screen, not the game area. px and % only. */
  h1{font-family:'Anton',sans-serif;font-size:64px;line-height:.82;
    transform:skewX(-10deg);text-transform:uppercase;}
  h1 .a{color:var(--bone);text-shadow:5px 5px 0 var(--blood),10px 10px 0 var(--violet);}
  h1 .b{display:block;color:var(--lemon);text-shadow:5px 5px 0 rgba(37,229,255,.9);}
  .sub{margin-top:12px;font-size:10.5px;letter-spacing:.14em;opacity:.7;text-transform:uppercase;}
  .moves{margin:16px auto 0;display:grid;grid-template-columns:repeat(3,1fr);gap:6px;max-width:620px;}
  .mv{display:flex;justify-content:space-between;gap:10px;border-left:2px solid var(--blood);
    padding:6px 9px;background:rgba(255,246,227,.05);font-size:9.5px;letter-spacing:.08em;}
  .mv b{color:var(--lemon);font-weight:500;}
  .mv span{opacity:.62;text-transform:uppercase;}
  button{margin-top:18px;font-family:'Anton',sans-serif;font-size:18px;letter-spacing:.2em;
    text-transform:uppercase;background:var(--lemon);color:#0B0710;border:0;padding:13px 40px;
    cursor:pointer;transform:skewX(-10deg);pointer-events:auto;}
  button:hover{background:#fff;}
  button:focus-visible{outline:3px solid var(--cyan);outline-offset:4px;}
  .stats{margin-top:14px;font-size:10px;letter-spacing:.16em;text-transform:uppercase;opacity:.8;}
  .stats b{color:var(--lemon);font-weight:500;}

  /* bout pips — the night's card, one mark per man */
  #pips{display:flex;gap:4px;margin-top:6px;justify-content:center;}
  #pips .pip{flex:1;height:3px;background:rgba(255,246,227,.16);display:block;
    transform:skewX(-16deg);}
  #pips .pip.won{background:var(--lemon);}
  #pips .pip.now{background:var(--bone);animation:blink .7s steps(2) infinite;}

  /* the corner: who's next and why he's a problem */
  .eyebrow{font-size:9px;letter-spacing:.34em;text-transform:uppercase;opacity:.5;margin-bottom:14px;}
  .heal{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--cyan);margin-bottom:12px;}
  .heal b{color:#fff;}
  .who{font-family:'Anton',sans-serif;font-size:42px;line-height:.94;transform:skewX(-9deg);
    text-transform:uppercase;letter-spacing:.01em;text-shadow:4px 4px 0 rgba(0,0,0,.6);}
  .rec{margin-top:8px;font-size:10px;letter-spacing:.24em;text-transform:uppercase;opacity:.6;}
  .warn{margin-top:16px;font-size:13px;line-height:1.7;letter-spacing:.02em;max-width:440px;
    margin-left:auto;margin-right:auto;}
  .tip{margin-top:12px;font-size:10.5px;line-height:1.7;letter-spacing:.04em;opacity:.62;
    max-width:440px;margin-left:auto;margin-right:auto;}
  .tip b{color:var(--lemon);opacity:1;font-weight:500;}
  #cardBtns{display:flex;justify-content:center;align-items:center;gap:10px;}
  button.ghost{background:transparent;color:var(--bone);font-size:13px;padding:13px 24px;
    box-shadow:inset 0 0 0 1.5px rgba(255,246,227,.35);}
  button.ghost:hover{background:rgba(255,246,227,.12);color:var(--bone);}

  /* ---------------- comic lettering ---------------- */
  #pow{position:absolute;inset:0;overflow:hidden;}
  .pw{position:absolute;font-family:'Anton',sans-serif;text-transform:uppercase;
    color:var(--lemon);-webkit-text-stroke:7px #0A0610;paint-order:stroke fill;
    text-shadow:7px 7px 0 var(--blood);white-space:nowrap;opacity:0;
    letter-spacing:.02em;will-change:transform,opacity;}
  @keyframes pw{
    0%{opacity:1;transform:translate(-50%,-50%) rotate(var(--r)) scale(.25);}
    12%{opacity:1;transform:translate(-50%,-50%) rotate(var(--r)) scale(1.22);}
    22%{transform:translate(-50%,-50%) rotate(var(--r)) scale(1);}
    72%{opacity:1;transform:translate(-50%,-50%) rotate(var(--r)) scale(1);}
    100%{opacity:0;transform:translate(-50%,-50%) rotate(var(--r)) scale(1.14);}
  }

  /* ---------------- pause sheet ---------------- */
  #pause{position:absolute;inset:0;z-index:7;display:none;place-items:center;padding:20px;
    background:rgba(8,6,14,.82);}
  #pause.on{display:grid;}
  #pause .sheet{width:min(560px,92%);border:1px solid rgba(255,246,227,.2);
    background:rgba(12,8,20,.9);padding:20px 22px;}
  .opts{display:grid;grid-template-columns:1fr 1fr;gap:8px 18px;margin:14px 0 4px;}
  .opt{display:flex;justify-content:space-between;align-items:center;gap:12px;
    font-size:10px;letter-spacing:.14em;text-transform:uppercase;opacity:.85;
    padding:7px 0;border-bottom:1px solid rgba(255,246,227,.1);cursor:pointer;}
  .opt.wide{grid-column:1/-1;}
  .opt b{color:var(--lemon);font-weight:500;}
  .opt input[type=checkbox]{appearance:none;width:34px;height:16px;background:rgba(255,246,227,.16);
    position:relative;cursor:pointer;transition:background .15s;flex:none;}
  .opt input[type=checkbox]:checked{background:var(--lemon);}
  .opt input[type=checkbox]::after{content:'';position:absolute;top:2px;left:2px;width:12px;height:12px;
    background:var(--bone);transition:transform .15s;}
  .opt input[type=checkbox]:checked::after{transform:translateX(18px);background:#0B0710;}
  .opt input[type=range]{appearance:none;width:170px;height:2px;background:rgba(255,246,227,.25);cursor:pointer;}
  .opt input[type=range]::-webkit-slider-thumb{appearance:none;width:12px;height:12px;background:var(--lemon);cursor:pointer;}
  .opt input[type=range]::-moz-range-thumb{border:0;width:12px;height:12px;background:var(--lemon);cursor:pointer;}
  .keyref{margin-top:12px;font-size:8.5px;letter-spacing:.1em;line-height:2;opacity:.5;text-transform:uppercase;}
  .keyref b{color:var(--bone);opacity:.9;font-weight:500;}
  .pbtns{display:flex;gap:10px;margin-top:6px;}
  .pbtns button{margin-top:12px;font-size:14px;padding:11px 26px;}

  /* ---------------- install ---------------- */
  #install{display:none;margin-top:14px;}
  body.installable #install, body.ios-install #install{display:inline-block;}
  button.install{background:transparent;color:var(--lemon);font-size:12px;padding:10px 20px;
    box-shadow:inset 0 0 0 1.5px var(--lemon);}
  button.install:hover{background:var(--lemon);color:#0B0710;}

  /* ---------------- mode select ---------------- */
  .modes{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin:18px auto 0;max-width:600px;}
  .mode{text-align:left;border:1px solid rgba(255,246,227,.18);background:rgba(255,246,227,.04);
    padding:11px 13px;cursor:pointer;transition:background .12s,border-color .12s;}
  .mode:hover,.mode:focus-visible{background:rgba(255,224,61,.1);border-color:var(--lemon);outline:none;}
  .mode h3{font-family:'Anton',sans-serif;font-size:19px;letter-spacing:.06em;transform:skewX(-8deg);
    text-transform:uppercase;line-height:1;}
  .mode .tag{font-size:8px;letter-spacing:.2em;text-transform:uppercase;color:var(--lemon);margin-top:5px;}
  .mode p{font-size:9.5px;line-height:1.7;opacity:.6;margin-top:6px;}
  .picks{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;margin:16px auto 0;max-width:600px;}
  .pick{display:flex;justify-content:space-between;align-items:center;gap:10px;cursor:pointer;
    border:1px solid rgba(255,246,227,.16);background:rgba(255,246,227,.04);padding:8px 11px;
    font-size:10px;letter-spacing:.08em;text-align:left;}
  .pick:hover{background:rgba(255,224,61,.1);border-color:var(--lemon);}
  .pick i{font-style:normal;font-size:8px;letter-spacing:.16em;opacity:.55;text-transform:uppercase;}

  /* ---------------- controller ---------------- */
  #toast{position:absolute;left:50%;bottom:7%;transform:translateX(-50%);z-index:6;
    font-size:8.5px;letter-spacing:.26em;text-transform:uppercase;opacity:0;
    background:rgba(8,6,14,.72);border:1px solid rgba(255,246,227,.28);
    padding:8px 14px;pointer-events:none;transition:opacity .4s ease;white-space:nowrap;}
  #toast.on{opacity:.9;}
  .padrow{display:none;margin:14px auto 0;max-width:560px;font-size:9px;
    letter-spacing:.12em;line-height:2.1;opacity:.8;text-transform:uppercase;}
  body.pad .padrow{display:block;}
  .padrow b{display:inline-block;min-width:26px;color:#0B0710;background:var(--lemon);
    font-weight:500;padding:1px 5px;margin:0 3px;}
  .padrow em{font-style:normal;opacity:.5;margin:0 5px;}

  /* ---------------- replay broadcast ---------------- */
  #hud{transition:opacity .3s ease;}
  #replay{position:absolute;inset:0;pointer-events:none;opacity:0;
    transition:opacity .25s ease;z-index:3;}
  #replay.on{opacity:1;pointer-events:auto;}
  .lb{position:absolute;left:0;right:0;height:9%;background:#000;
    transition:transform .45s cubic-bezier(.2,.9,.2,1);}
  .lbTop{top:0;transform:translateY(-100%);}
  .lbBot{bottom:0;transform:translateY(100%);}
  #replay.on .lbTop,#replay.on .lbBot{transform:translateY(0);}
  #rpCut{position:absolute;inset:0;background:#fff;opacity:0;}
  #rpCut.flash{animation:cutFlash .16s ease-out;}
  @keyframes cutFlash{0%{opacity:.5;}100%{opacity:0;}}
  #rpInfo{position:absolute;left:26px;bottom:12%;}
  #rpTag{display:flex;align-items:center;gap:6px;font-size:9px;letter-spacing:.32em;
    text-transform:uppercase;opacity:.75;margin-bottom:5px;}
  #rpTag i{width:6px;height:6px;border-radius:50%;background:var(--blood);
    animation:blink .8s steps(2) infinite;}
  #rpName{font-family:'Anton',sans-serif;font-size:32px;letter-spacing:.06em;
    transform:skewX(-9deg);text-transform:uppercase;line-height:1;
    text-shadow:3px 3px 0 rgba(0,0,0,.7);}
  #rpSub{font-size:9.5px;letter-spacing:.16em;opacity:.5;margin-top:5px;text-transform:uppercase;}
  #rpNum{position:absolute;right:26px;bottom:12%;font-family:'Anton',sans-serif;
    font-size:26px;letter-spacing:.1em;transform:skewX(-9deg);opacity:.8;}
  #rpBarWrap{position:absolute;left:26px;right:26px;bottom:calc(9% + 14px);height:1px;
    background:rgba(255,246,227,.2);}
  #rpBar{display:block;height:2px;margin-top:-1px;background:var(--lemon);
    transform-origin:left;transform:scaleX(0);}
  #rpSkip{position:absolute;right:26px;top:calc(9% + 14px);font-size:8.5px;
    letter-spacing:.24em;text-transform:uppercase;opacity:.35;}

  /* ---------------- touch pad ---------------- */
  #pad{position:absolute;inset:0;display:none;pointer-events:none;z-index:4;}
  body.touch #pad{display:block;}
  .btn{position:absolute;pointer-events:auto;width:56px;height:56px;border-radius:50%;
    border:1.5px solid rgba(255,246,227,.4);background:rgba(255,246,227,.09);
    display:grid;place-items:center;font-size:8.5px;letter-spacing:.06em;
    font-family:'Anton',sans-serif;text-transform:uppercase;backdrop-filter:blur(3px);}
  .btn:active{background:var(--lemon);color:#0B0710;}
  #bJab{right:92px;bottom:86px;} #bCross{right:26px;bottom:86px;}
  #bHook{right:92px;bottom:22px;} #bUp{right:26px;bottom:22px;background:rgba(255,45,85,.3);}
  #bBlk{left:150px;bottom:22px;width:56px;}
  #stickZone{position:absolute;left:0;bottom:0;width:140px;height:150px;pointer-events:auto;}
  #stick{position:absolute;left:34px;bottom:30px;width:100px;height:100px;border-radius:50%;
    border:1.5px dashed rgba(255,246,227,.28);transition:transform .2s ease;}
  #stick.dragging{transition:none;}
  #nub{position:absolute;left:50%;top:50%;width:40px;height:40px;margin:-20px 0 0 -20px;
    border-radius:50%;background:rgba(255,246,227,.28);border:1px solid rgba(255,246,227,.5);}
</style>
</head>
<body>
<div id="app">
  <div id="stage"></div>

  <div id="hud">
    <div id="vig"></div>
    <div id="tint"></div>

    <div id="foe">
      <div class="name"><h2 id="foeName">—</h2><span id="foeRec">—</span></div>
      <div class="bar"><i id="foeGhost"></i><i id="foeFill"></i></div>
      <div id="pips"></div>
    </div>

    <div id="me">
      <div class="lab">Your chin</div>
      <div class="bar"><i id="meFill"></i></div>
    </div>

    <div id="super">
      <div class="lab">Adrenaline</div>
      <div class="bar"><i id="superFill"></i></div>
    </div>

    <div id="rng">Range <b id="rngV">—</b></div>
    <div id="combo"><b id="comboN">0</b><i id="comboR">HIT</i></div>
    <div id="shout"></div>
    <div id="dmg"></div>
    <div id="pow"></div>
  </div>

  <div id="pad">
    <div id="stickZone"><div id="stick"><div id="nub"></div></div></div>
    <div class="btn" id="bBlk">Block</div>
    <div class="btn" id="bJab">Jab</div>
    <div class="btn" id="bCross">Cross</div>
    <div class="btn" id="bHook">Hook</div>
    <div class="btn" id="bUp">Upper</div>
  </div>

  <div id="pause">
    <div class="sheet">
      <div class="eyebrow">Paused</div>
      <div class="opts">
        <label class="opt"><span>Vibration</span><input type="checkbox" id="optVibe" checked></label>
        <label class="opt"><span>Controller rumble</span><input type="checkbox" id="optRumble" checked></label>
        <label class="opt wide"><span>Squish <b id="optSquishV">100%</b></span>
          <input type="range" id="optSquish" min="0" max="150" value="100"></label>
      </div>
      <div class="keyref" id="keyref"></div>
      <div class="pbtns">
        <button id="pResume">Resume</button>
        <button id="pQuit" class="ghost">Quit to menu</button>
      </div>
    </div>
  </div>

  <div id="toast"></div>

  <div id="replay">
    <div class="lb lbTop"></div>
    <div class="lb lbBot"></div>
    <div id="rpCut"></div>
    <div id="rpInfo">
      <div id="rpTag"><i></i>Replay</div>
      <div id="rpName">BROADCAST</div>
      <div id="rpSub">the shot that did it</div>
    </div>
    <div id="rpNum">1 / 4</div>
    <div id="rpBarWrap"><i id="rpBar"></i></div>
    <div id="rpSkip">any key to skip</div>
  </div>

  <div id="veil">
    <div class="card">
      <div id="cardBody"></div>
      <div id="cardBtns"><button id="go">Touch gloves</button></div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){
'use strict';

const V3 = THREE.Vector3;
const K = { bone:0xFFF6E3, lemon:0xFFE03D, blood:0xFF2D55, violet:0x8B3BFF, cyan:0x25E5FF };
const RING = 3.35;            // half-width of the fighting area
const clamp = (v,a,b) => v < a ? a : (v > b ? b : v);

// ============================================================ landscape lock
const app = document.getElementById('app');
let VW = 0, VH = 0, rotated = false;
if(matchMedia('(pointer:coarse)').matches) document.body.classList.add('touch');

function layout(){
  rotated = innerHeight > innerWidth;
  VW = rotated ? innerHeight : innerWidth;
  VH = rotated ? innerWidth  : innerHeight;
  app.style.width  = VW + 'px';
  app.style.height = VH + 'px';
  app.style.transform = 'translate(-50%,-50%)' + (rotated ? ' rotate(90deg)' : '');
  if(window.__resizeGL) window.__resizeGL();
}
layout();
addEventListener('resize', layout);
addEventListener('orientationchange', () => setTimeout(layout, 120));

// try for a real hardware lock on the way in; the CSS rotation covers us when it fails
function forceLandscape(){
  try{
    const de = document.documentElement;
    if(!document.fullscreenElement && de.requestFullscreen) {
      const p = de.requestFullscreen();
      if(p && p.then) p.then(lockIt).catch(lockIt);
      else lockIt();
    } else lockIt();
  }catch(e){}
  function lockIt(){
    try{
      if(screen.orientation && screen.orientation.lock) {
        const p = screen.orientation.lock('landscape');
        if(p && p.catch) p.catch(function(){});
      }
    }catch(e){}
    setTimeout(layout, 200);
  }
}

// ============================================================ renderer
const stage = document.getElementById('stage');
const renderer = new THREE.WebGLRenderer({ antialias:true, powerPreference:'high-performance' });
const DPR = Math.min(devicePixelRatio, 2);
renderer.setPixelRatio(DPR);

    uAber:{value:0}, uZoom:{value:0}, uFlash:{value:0}, uGlitch:{value:0},
    uShock:{value:0}, uSat:{value:1}, uTime:{value:0}, uImpact:{value:0},
    uFlashCol:{value:new THREE.Color(0xffffff)},
    uImpA:{value:new THREE.Color(0xFFE03D)}, uImpB:{value:new THREE.Color(0x0A0610)}

  vertexShader:'varying vec2 vUv; void main(){ vUv=uv; gl_Position=vec4(position.xy,0.,1.); }',
  fragmentShader:[
  'uniform sampler2D tDiffuse;',
  'uniform float uAber,uZoom,uFlash,uGlitch,uShock,uSat,uTime,uImpact;',
  'uniform vec3 uFlashCol, uImpA, uImpB;',
  'varying vec2 vUv;',
  'float hash(float n){ return fract(sin(n)*43758.5453); }',
  'void main(){',
  '  vec2 uv = vUv; vec2 c = uv - 0.5;',
  '  float r = length(c);',
  '  vec2 dir = c / max(r, 0.0001);',
  '  if(uShock > 0.001){',
  '    float d = abs(r - uShock*0.85);',
  '    float w = smoothstep(0.10, 0.0, d) * (1.0 - uShock);',
  '    uv += dir * w * 0.075;',
  '  }',
  '  if(uGlitch > 0.001){',
  '    float band = floor(uv.y*22.0);',
  '    float n = hash(band*13.13 + floor(uTime*46.0));',
  '    uv.x += (n-0.5) * uGlitch * 0.14 * step(0.55, n);',
  '  }',
  '  float ab = uAber * (0.18 + r*1.4);',
  '  vec3 sum = vec3(0.0); float tot = 0.0;',
  '  for(int i=0;i<6;i++){',
  '    float t = float(i)/5.0;',
  '    vec2 s = uv - c * uZoom * t;',
  '    float w = 1.0 - t*0.55;',
  '    sum.r += texture2D(tDiffuse, s + dir*ab).r * w;',
  '    sum.g += texture2D(tDiffuse, s).g * w;',
  '    sum.b += texture2D(tDiffuse, s - dir*ab).b * w;',
  '    tot += w;',
  '  }',
  '  vec3 col = sum / tot;',
  '  float l = dot(col, vec3(0.299,0.587,0.114));',
  '  col = mix(vec3(l), col, uSat);',
  '  col += uFlashCol * uFlash;',

  // to two flat inks. no gradients, no shading — the thing animators cut to for
  // a single frame so your eye reads the hit before it reads the picture.
  '  if(uImpact > 0.5){',

// ============================================================ fighters
const UP = new V3(0,1,0);
// stance: lead foot forward-left, rear foot back-right (fighter faces -z).
// a southpaw mirrors it — lead foot forward-right — which is why lefties read wrong.
const STANCE = [ {x:-0.24, z:-0.26}, {x:0.27, z:0.30} ];
function stanceOf(f, i){
  const s = STANCE[i];
  return f.mirror ? { x:-s.x, z:s.z } : s;
}
const THIGH = 0.44, SHIN = 0.44, HIP_Y = 0.80;
const ARM_U = 0.40, ARM_F = 0.44;

// one two-bone IK solver, used by both the legs and the arms.
// bendDir says which way the joint breaks: knees forward, elbows down and out.
// STRETCH_MAX bounds the reach: past full extension the limb can flex a little
// further (a real arm reaching for something just out of range), but the root
// and tip are driven by gameplay targets that can wander arbitrarily far apart
// (a punch aimed past the opponent's centre, a planted foot left behind by a
// quick step) — without a ceiling here the bone between them stretches to
// match, however far that is. Past the cap the drawn limb simply stops
// short of its target rather than growing without limit.
const STRETCH_MAX = 1.25;
const _tb = new V3(), _dirN = new V3(), _bnd = new V3(), _jnt = new V3(), _vtip = new V3();
function solveTwoBone(b1, b2, joint, root, tip, L1, L2, bendDir){
  _tb.subVectors(tip, root);
  let d = _tb.length();
  if(d < 1e-4){ _tb.set(0,-1,0); d = 1e-4; }
  _dirN.copy(_tb).divideScalar(d);
  const maxD = (L1 + L2) * STRETCH_MAX;
  const visD = Math.min(d, maxD);
  _vtip.copy(root).addScaledVector(_dirN, visD);
  if(visD >= L1 + L2){
    // past full extension the arm is a straight line with no visible bend, so
    // rather than snapping short we let it reach and share the stretch across
    // both bones — the elbow stays at its proper proportion along the limb.
    _jnt.copy(root).addScaledVector(_dirN, visD * (L1/(L1+L2)));
  } else {
    _bnd.copy(bendDir);
    _bnd.addScaledVector(_dirN, -_bnd.dot(_dirN));      // orthogonalise
    if(_bnd.lengthSq() < 1e-5){ _bnd.set(0,-1,0).addScaledVector(_dirN, _dirN.y); }
    _bnd.normalize();
    const a = (L1*L1 - L2*L2 + visD*visD) / (2*visD);
    const h = Math.sqrt(Math.max(0, L1*L1 - a*a));
    _jnt.copy(root).addScaledVector(_dirN, a).addScaledVector(_bnd, h);
  }
  orient(b1, root, _jnt);
  orient(b2, _jnt, _vtip);
  if(joint) joint.position.copy(_jnt);
}

function bone(r1,r2,mat){
  const m = new THREE.Mesh(new THREE.CylinderGeometry(r1,r2,1,8), mat);
  m.castShadow = true; return m;
}
// ============================================================ squish
// Flesh gives. Each dentable mesh carries a dent centre, an inward direction
// and an amount, pushed into the vertex shader. These materials are flat
// shaded, and three derives flat normals from screen-space derivatives in the
// fragment shader — so a dented surface lights itself correctly for free.
// SQUISH, dialled to the stop. headMax is bounded by the head's own radius
// (0.235): dent it deeper than that and the face turns inside out, so 0.19
// caves it to ~19% of its depth and stops just short of the far wall.
// Was: headMax 0.095, gloveMax 0.075, radius 0.17, gloveR 0.13, stiff 820,
// damp 24, rebound 0.45 — that's the grounded setting if you want it back.
const SQUISH = { headMax:0.19, gloveMax:0.15, radius:0.30, gloveR:0.24,
                 stiff:380, damp:9, rebound:0.70 };
function dentify(mat, radius){
  const u = {
    uDentP:{ value:new V3(0,99,0) },
    uDentN:{ value:new V3(0,0,1) },
    uDentA:{ value:0 },
    uDentR:{ value:radius || SQUISH.radius }
  };
  mat.userData.u = u;
  mat.onBeforeCompile = function(sh){
    sh.uniforms.uDentP = u.uDentP; sh.uniforms.uDentN = u.uDentN;
    sh.uniforms.uDentA = u.uDentA; sh.uniforms.uDentR = u.uDentR;
    sh.vertexShader =
      'uniform vec3 uDentP; uniform vec3 uDentN; uniform float uDentA; uniform float uDentR;\n'
      + sh.vertexShader.replace('#include <begin_vertex>',
        '#include <begin_vertex>\n' +
        'float dD = distance(transformed, uDentP);\n' +
        'float dW = smoothstep(uDentR, 0.0, dD);\n' +
        'dW = dW*dW*(3.0-2.0*dW);\n' +              // soften the shoulder of the dent
        'transformed += uDentN * (uDentA * dW);\n');
  };
  mat.customProgramCacheKey = function(){ return 'dent'; };
  return mat;
}
function deform(max){ return { a:0, v:0, t:0, max:max, p:new V3(0,99,0), n:new V3(0,0,1) }; }
function springDeform(d, raw){
  // hard-driven while a glove is on it, then released to wobble
  d.v += ((d.t - d.a)*SQUISH.stiff - d.v*SQUISH.damp) * raw;
  d.a += d.v * raw;
  d.a = clamp(d.a, -d.max*SQUISH.rebound, d.max);   // negative overshoot = it bulges back out
  d.t = 0;                                // resolveContacts re-asserts this each frame
}
function applyDeform(mesh, d, scale){
  const u = mesh.material.userData.u;
  if(!u) return;
  u.uDentA.value = d.a / (scale || 1);
  u.uDentP.value.copy(d.p);
  u.uDentN.value.copy(d.n);
}

function makeFighter(o){
  const g = new THREE.Group();
  const skin  = new THREE.MeshStandardMaterial({ color:o.skin, roughness:.68, flatShading:true });
  const trunk = new THREE.MeshStandardMaterial({ color:o.trunk, roughness:.5, flatShading:true });
  const gl    = new THREE.MeshStandardMaterial({ color:o.glove, roughness:.24, metalness:.2, flatShading:true });
  const boot  = new THREE.MeshStandardMaterial({ color:o.boot, roughness:.45, flatShading:true });

  const body = new THREE.Group(); g.add(body);   // everything above the hips

  const torso = new THREE.Mesh(new THREE.CylinderGeometry(0.40,0.30,0.86,9), skin);
  torso.position.y = 1.24; torso.castShadow = true; body.add(torso);
  const hips = new THREE.Mesh(new THREE.CylinderGeometry(0.30,0.31,0.34,9), trunk);
  hips.position.y = 0.76; hips.castShadow = true; body.add(hips);
  const head = new THREE.Mesh(new THREE.SphereGeometry(0.235,18,14), dentify(skin.clone()));
  head.position.set(0,1.80,-0.02); head.castShadow = true; body.add(head);
  const brow = new THREE.Mesh(new THREE.BoxGeometry(0.34,0.07,0.1),
    new THREE.MeshStandardMaterial({color:0x0E0812,roughness:.9}));
  brow.position.set(0,1.85,-0.22); body.add(brow);
  const shoulders = [];
  for(const sx of [-1,1]){
    const sh = new THREE.Mesh(new THREE.SphereGeometry(0.16,9,8), skin);
    sh.position.set(sx*0.40, 1.52, 0); sh.castShadow = true; body.add(sh);
    shoulders.push(sh);
  }

  // arms: upper + forearm with a real elbow between them
  function arm(){
    const up = bone(0.115,0.10, skin);
    const fore = bone(0.10,0.125, skin);
    const elb = new THREE.Mesh(new THREE.SphereGeometry(0.095,8,7), skin);
    elb.castShadow = true;
    g.add(up); g.add(fore); g.add(elb);
    return { up:up, fore:fore, elb:elb, bias:new V3() };
  }
  const armL = arm(), armR = arm();
  function glove(){
    const m = new THREE.Mesh(new THREE.SphereGeometry(0.185,16,12), dentify(gl.clone(), SQUISH.gloveR));
    m.scale.set(1,1,1.22); m.castShadow = true; g.add(m); return m;
  }
  const gloveL = glove(), gloveR = glove();

  // legs: thigh + shin + boot per side, driven by 2-bone IK from planted feet
  const legs = [];
  for(let i=0;i<2;i++){
    const th = bone(0.14,0.115, skin), sh = bone(0.105,0.09, skin);
    const bt = new THREE.Mesh(new THREE.BoxGeometry(0.20,0.11,0.34), boot);
    bt.castShadow = true;
    g.add(th); g.add(sh); g.add(bt);
    legs.push({ thigh:th, shin:sh, boot:bt, kneeLocal:new V3(),
      hip:new V3((i===0?-1:1)*0.15, HIP_Y, 0),
      world:new V3(), from:new V3(), to:new V3(),
      stepT:1, lift:0 });
  }

  return {
    group:g, body:body, torso:torso, head:head,
    armL:armL, armR:armR, gloveL:gloveL, gloveR:gloveR, legs:legs, shoulders:shoulders,
    hips:hips,
    // world-space collision shapes, rebuilt every frame
    col:{ head:{ c:new V3(), r:0.235 },
          torso:{ a:new V3(), b:new V3(), r:0.34 },
          gL:{ c:new V3(), r:0.195 }, gR:{ c:new V3(), r:0.195 } },
    rag:null,
    shL:new V3(-0.40,1.52,0), shR:new V3(0.40,1.52,0),
    guardL:new V3(-0.32,1.44,-0.42), guardR:new V3(0.34,1.42,-0.40),
    pos:new V3(), yaw:0, punch:null, stagger:0, hurt:0, dead:false,
    stepCool:0, sway:0, mirror:false, spec:null,
    dHead:deform(SQUISH.headMax), dGL:deform(SQUISH.gloveMax), dGR:deform(SQUISH.gloveMax),
    mats:{ skin:skin, gl:gl, trunk:trunk, boot:boot, brow:brow.material,
           headMat:head.material, gloveMats:[gloveL.material, gloveR.material] }
  };
}
// which physical hand throws a given move — flipped for a southpaw
function sideOf(f, mv){ return f.mirror ? (mv.side === 'L' ? 'R' : 'L') : mv.side; }
const P = makeFighter({ skin:0xC98B63, trunk:0x1B1030, glove:0xFF2D55, boot:0x2A0E18 });
const F = makeFighter({ skin:0x8E6A50, trunk:0x0F2A55, glove:0x25E5FF, boot:0x0A1C34 });
F.torso.scale.set(1.14,1.06,1.14);
scene.add(P.group); scene.add(F.group);

function orient(mesh, a, b){
  mesh.position.copy(a).add(b).multiplyScalar(0.5);
  const d = new V3().subVectors(b,a);
  const len = Math.max(d.length(), 0.01);
  mesh.scale.set(1, len, 1);
  mesh.quaternion.setFromUnitVectors(UP, d.normalize());
}
// local <-> world on the ground plane (fighters only ever yaw)
function toWorld(f, lx, lz, out){
  const c = Math.cos(f.yaw), s = Math.sin(f.yaw);
  out.set(f.pos.x + lx*c + lz*s, 0, f.pos.z + (-lx*s + lz*c));
  return out;
}
function toLocal(f, w, out){
  const dx = w.x - f.pos.x, dz = w.z - f.pos.z;
  const c = Math.cos(f.yaw), s = Math.sin(f.yaw);
  out.set(dx*c - dz*s, w.y, dx*s + dz*c);
  return out;
}

// ---- arms: elbows break down and away from the ribs ----
const _shp = new V3(), _abend = new V3();
function solveArm(f, side){
  const A = side === 'L' ? f.armL : f.armR;
  const glove = side === 'L' ? f.gloveL : f.gloveR;
  const sign = side === 'L' ? -1 : 1;
  // the shoulder rides the torso — when he turns his body into a cross, the
  // shoulder comes with it and the punch gains the reach it should
  _shp.copy(side === 'L' ? f.shL : f.shR).applyMatrix4(f.body.matrix);
  // a hook throws the elbow wide; everything else keeps it tucked
  const hooking = f.punch && f.punch.mv.arc === 'hook' && sideOf(f, f.punch.mv) === side;
  _abend.set(sign * (hooking ? 1.6 : 0.5), hooking ? -0.25 : -1, hooking ? 0.15 : 0.4);
  _abend.add(A.bias);      // whatever avoidBones learned about his skull last frame
  solveTwoBone(A.up, A.fore, A.elb, _shp, glove.position, ARM_U, ARM_F, _abend);
}

// ---- collision ---------------------------------------------------------
// The body is a real collider set now, not just a head: a head sphere, a torso
// capsule, and both gloves. Punching arms are capsules too, because a hook's
// forearm will happily saw through a skull that a glove-only test declares
// clear. Nothing here is allowed to end a frame inside anything else.
const _s1 = new V3(), _s2 = new V3(), _ab = new V3(), _ap = new V3();
function closestOnSeg(a, b, p, out){
  _ab.subVectors(b, a); _ap.subVectors(p, a);
  const len2 = _ab.lengthSq();
  const t = len2 < 1e-9 ? 0 : clamp(_ap.dot(_ab)/len2, 0, 1);
  return out.copy(a).addScaledVector(_ab, t);

// push a sphere out of another sphere. returns penetration depth.

const _cg = new V3(), _cax = new V3(), _cq = new THREE.Quaternion(), _cp = new V3();
// resolve one glove against a defender: head, torso and guard, deepest first
function resolveGlove(att, glove, dGlove, def, isSelf){
  const gScale = att.group.scale.x || 1;
  const gR = 0.195 * gScale;
  glove.getWorldPosition(_cg);

  const cands = [];
  cands.push({ kind:'head', c:def.col.head.c, r:def.col.head.r, d:def.dHead, mesh:def.head });
  cands.push({ kind:'torso', cap:def.col.torso });
  if(!isSelf){
    cands.push({ kind:'g', c:def.col.gL.c, r:def.col.gL.r, d:def.dGL, mesh:def.gloveL });
    cands.push({ kind:'g', c:def.col.gR.c, r:def.col.gR.r, d:def.dGR, mesh:def.gloveR });
  }
  let best = null, bestPen = 0;
  for(let i=0;i<cands.length;i++){
    const t = cands[i];
    const pen = t.kind === 'torso'
      ? pushOutCapsule(_cg, gR, t.cap, _s2)
      : pushOutSphere(_cg, gR, t.c, t.r, _s2);
    if(pen > bestPen){ bestPen = pen; best = t; _cax.copy(_s2); }
  }
  if(!best) return;

  // how much give: a jab barely marks him, an uppercut caves his face in
  let power = 0.55;
  if(att.punch && sideOf(att, att.punch.mv) === (glove === att.gloveL ? 'L' : 'R')){
    power = clamp(0.45 + att.punch.mv.shake*0.6, 0.4, 1);
  }
  // only flesh with a dent rig gives; ribs and your own body just stop you
  const soft = !!best.d && !isSelf;
  const giveA = soft ? best.d.max*power : 0;
  const giveB = soft ? dGlove.max*power*0.8 : 0;
  const give = giveA + giveB;

  const dent = Math.min(bestPen, give);
  const push = bestPen - dent;               // whatever the flesh can't absorb
  if(push > 0){
    _cp.copy(_cg).addScaledVector(_cax, push);
    att.group.worldToLocal(_cp);
    glove.position.copy(_cp);
  }
  if(!soft || give <= 1e-6) return;

  const split = giveA/give;
  best.d.t = Math.max(best.d.t, dent*split);
  _cq.copy(best.mesh.getWorldQuaternion(_cq)).invert();
  best.d.n.copy(_cax).applyQuaternion(_cq).normalize();
  best.d.p.copy(best.d.n).multiplyScalar(best.r / (def.group.scale.x || 1));
  best.d.n.negate();                          // dent pushes inward

  dGlove.t = Math.max(dGlove.t, dent*(1-split));
  _cq.copy(glove.getWorldQuaternion(_cq)).invert();
  dGlove.n.copy(_cax).applyQuaternion(_cq).normalize();
  dGlove.p.copy(dGlove.n).multiplyScalar(-0.185);
}

// keep the arm BONES out of him too. a buried forearm can't be fixed by moving
// the glove, so we steer the elbow instead: nudge the IK pole vector and
// re-solve. the bias decays, so the arm returns to a natural carriage the
// moment it's clear of him.
const _bw = new V3(), _bn = new V3(), _bsh = new V3(), _be = new V3(),
      _bg = new V3(), _bbest = new V3();
function avoidBones(f, side, opp){
  const A = side === 'L' ? f.armL : f.armR;
  const glove = side === 'L' ? f.gloveL : f.gloveR;
  A.bias.multiplyScalar(0.80);                      // release when clear
  if(A.bias.lengthSq() < 1e-6) A.bias.set(0,0,0);

  A.elb.getWorldPosition(_be);
  glove.getWorldPosition(_bg);
  _bsh.copy(side === 'L' ? f.shL : f.shR).applyMatrix4(f.body.matrixWorld);

  const r = 0.115 * (f.group.scale.x || 1);
  let worst = 0;
  _bbest.set(0,0,0);
  // sample along upper arm then forearm; the tip is the glove's own problem
  for(let i=0;i<8;i++){
    const t = i/8;
    if(t <= 0.5) _bw.lerpVectors(_bsh, _be, t*2);
    else _bw.lerpVectors(_be, _bg, (t-0.5)*2);
    let pen = pushOutSphere(_bw, r, opp.col.head.c, opp.col.head.r, _bn);
    if(pen > worst){ worst = pen; _bbest.copy(_bn); }
    pen = pushOutCapsule(_bw, r, opp.col.torso, _bn);
    if(pen > worst){ worst = pen; _bbest.copy(_bn); }

    _bn.applyQuaternion(_cq).normalize();
    A.bias.addScaledVector(_bn, Math.min(worst, 0.25) * 3.0);
    if(A.bias.length() > 2.5) A.bias.setLength(2.5);
    solveArm(f, side);                              // re-solve with the new pole
  }
}

// nothing gets to go under the canvas
function floorClamp(f){
  const s = f.group.scale.x || 1;
  [[f.gloveL, 0.195], [f.gloveR, 0.195], [f.armL.elb, 0.095], [f.armR.elb, 0.095]]
    .forEach(function(pair){
      const m = pair[0], r = pair[1]*s;
      m.getWorldPosition(_cg);
      if(_cg.y < r){
        _cg.y = r;
        f.group.worldToLocal(_cg);
        m.position.copy(_cg);
      }
    });
}

function resolveContacts(){
  P.group.updateMatrixWorld(true); F.group.updateMatrixWorld(true);
  updateColliders(P); updateColliders(F);
  // two relaxation passes: resolving one contact can create another
  for(let it=0; it<2; it++){
    if(!P.rag){
      resolveGlove(P, P.gloveL, P.dGL, F, false);
      resolveGlove(P, P.gloveR, P.dGR, F, false);
      resolveGlove(P, P.gloveL, P.dGL, P, true);    // and out of his own chest and chin
      resolveGlove(P, P.gloveR, P.dGR, P, true);
    }
    if(!F.rag){
      resolveGlove(F, F.gloveL, F.dGL, P, false);
      resolveGlove(F, F.gloveR, F.dGR, P, false);
      resolveGlove(F, F.gloveL, F.dGL, F, true);
      resolveGlove(F, F.gloveR, F.dGR, F, true);
    }
    P.group.updateMatrixWorld(true); F.group.updateMatrixWorld(true);
    updateColliders(P); updateColliders(F);

}

    applyDeform(f.head, f.dHead, s);

    hipL:  ragPoint(hipW('L'), 0.14*s), hipR: ragPoint(hipW('R'), 0.14*s),
    elbL:  ragPoint(w(f.armL.elb), 0.10*s), elbR: ragPoint(w(f.armR.elb), 0.10*s),
    gloL:  ragPoint(w(f.gloveL), 0.19*s),   gloR: ragPoint(w(f.gloveR), 0.19*s),
    kneL:  ragPoint(new V3().copy(f.legs[0].kneeLocal).applyMatrix4(f.group.matrixWorld), 0.11*s),
    kneR:  ragPoint(new V3().copy(f.legs[1].kneeLocal).applyMatrix4(f.group.matrixWorld), 0.11*s),

function ragImpulse(f, dir, power){

const _rv = new V3(), _rn = new V3();

  // as a velocity spike and fire him across the arena — so accumulate instead.
  R.acc = (R.acc || 0) + dt;

function ragStep(f, opp, dt){

    const q = list[i];

    q.o.copy(q.p);
    q.p.add(_rv);
    q.p.y += RAG.grav * dt * dt;

      c.b.p.addScaledVector(_rv, -diff);

        q.o.x += (q.p.x - q.o.x) * RAG.friction;
        q.o.z += (q.p.z - q.o.z) * RAG.friction;

      q.p.z = clamp(q.p.z, -4.15, 4.15);

// ---- procedural footwork: feet plant, then shuffle to catch up ----
const _ideal = new V3(), _fl = new V3(), _hip = new V3();
const _kneeBend = new V3(0,0,-1);          // knees break forward
function resetFeet(f){
  for(let i=0;i<2;i++){
    const st = stanceOf(f, i);
    toWorld(f, st.x, st.z, f.legs[i].world);
    f.legs[i].stepT = 1; f.legs[i].lift = 0;
  }
}
function updateFeet(f, dt, moving){
  f.stepCool -= dt;
  let anyStepping = false;
  for(let i=0;i<2;i++) if(f.legs[i].stepT < 1) anyStepping = true;

  for(let i=0;i<2;i++){
    const L = f.legs[i];
    const st = stanceOf(f, i);
    toWorld(f, st.x, st.z, _ideal);
    if(L.stepT >= 1){
      const off = Math.hypot(L.world.x - _ideal.x, L.world.z - _ideal.z);
      // one foot at a time, and only once it's drifted far enough from stance
      if(off > 0.22 && !anyStepping && f.stepCool <= 0 && !f.dead){
        L.from.copy(L.world);
        L.to.copy(_ideal);
        // overshoot slightly in the direction of travel so the step leads the body
        L.to.x += (_ideal.x - L.world.x) * 0.30;
        L.to.z += (_ideal.z - L.world.z) * 0.30;
        L.stepT = 0; f.stepCool = 0.05;
        anyStepping = true;
        sfxStep();
      }
    } else {
      L.stepT = Math.min(1, L.stepT + dt / (moving ? 0.13 : 0.18));
      const t = L.stepT;
      L.world.lerpVectors(L.from, L.to, t*t*(3-2*t));
      L.lift = Math.sin(t*Math.PI) * 0.085;
      L.world.y = L.lift;
      if(t >= 1){ L.lift = 0; L.world.y = 0; }
    }
  }
}
function solveLegs(f){
  const bobY = f.body.position.y;
  for(let i=0;i<2;i++){
    const L = f.legs[i];
    _hip.set(L.hip.x + f.body.position.x*0.5, L.hip.y + bobY, L.hip.z + f.body.position.z*0.55);
    toLocal(f, L.world, _fl);
    _fl.y = L.world.y + 0.055;                 // ankle sits above the sole
    solveTwoBone(L.thigh, L.shin, null, _hip, _fl, THIGH, SHIN, _kneeBend);
    L.kneeLocal.copy(_jnt);      // ragdoll needs the real knee to measure the thigh
    L.boot.position.set(_fl.x, Math.max(0.055, L.world.y + 0.055), _fl.z + 0.05);
    L.boot.rotation.set(-L.lift*2.2, 0, 0);
  }
}

    const r = (i%2 ? inner : 1) * (1 - Math.random()*jitter);
    pts.push(new THREE.Vector2(Math.cos(a)*r, Math.sin(a)*r));

}
const POWS = [];

  const flat = function(col, order){
    return new THREE.MeshBasicMaterial({ color:col, transparent:true, depthTest:false,

function popStar(pos, size, col, life){

function starTick(raw){
  for(let i=0;i<POWS.length;i++){
    const s = POWS[i];
    if(s.life <= 0) continue;
    s.life -= raw;
    if(s.life <= 0){ s.g.visible = false; continue; }   // hard cut, no fade
    const t = 1 - s.life/s.max;
    const pop = t < 0.14 ? (t/0.14) : 1;                // two-frame snap to full
    s.g.scale.setScalar(s.size * (0.35 + pop*0.65) * (1 + t*0.10));

    s.g.rotateZ(s.spin);

// ============================================================ audio
let actx = null, noiseBuf = null;
function audioInit(){
  if(actx) return;
  const AC = window.AudioContext || window.webkitAudioContext;
  if(!AC) return;
  actx = new AC();
  noiseBuf = actx.createBuffer(1, (actx.sampleRate*0.6)|0, actx.sampleRate);
  const d = noiseBuf.getChannelData(0);
  for(let i=0;i<d.length;i++) d[i] = Math.random()*2-1;
  crowdInit();
}
function noise(dur, vol, freq, q){
  if(!actx) return;
  const s = actx.createBufferSource(); s.buffer = noiseBuf;
  const f = actx.createBiquadFilter(); f.type='bandpass'; f.frequency.value=freq; f.Q.value=q||1;
  const g = actx.createGain();
  g.gain.setValueAtTime(vol, actx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.0001, actx.currentTime+dur);
  s.connect(f).connect(g).connect(actx.destination); s.start(); s.stop(actx.currentTime+dur);
}
function tone(f1, f2, dur, type, vol){
  if(!actx) return;
  const o = actx.createOscillator(), g = actx.createGain();
  o.type = type||'sine';
  o.frequency.setValueAtTime(f1, actx.currentTime);
  o.frequency.exponentialRampToValueAtTime(Math.max(f2,1), actx.currentTime+dur);
  g.gain.setValueAtTime(vol||0.1, actx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.0001, actx.currentTime+dur);
  o.connect(g).connect(actx.destination); o.start(); o.stop(actx.currentTime+dur);
}
// ---- the crowd ----------------------------------------------------------
// Ten thousand people are a filtered noise floor that breathes. Two layers:
// a low murmur that's always there, and a mid "roar" band that opens up when
// something happens. Both ride one excitement value.
const CROWD = { level:0, spike:0, murmurG:null, roarG:null, roarF:null, on:false };
function crowdBuffer(seconds){
  const sr = actx.sampleRate, n = (sr*seconds)|0;
  const buf = actx.createBuffer(2, n, sr);
  for(let ch=0; ch<2; ch++){
    const d = buf.getChannelData(ch);
    let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0,b6=0;
    for(let i=0;i<n;i++){
      const w = Math.random()*2-1;
      // Paul Kellet's pink filter — white noise is a hiss, pink is a crowd
      b0 = 0.99886*b0 + w*0.0555179; b1 = 0.99332*b1 + w*0.0750759;
      b2 = 0.96900*b2 + w*0.1538520; b3 = 0.86650*b3 + w*0.3104856;
      b4 = 0.55000*b4 + w*0.5329522; b5 = -0.7616*b5 - w*0.0168980;
      const pink = (b0+b1+b2+b3+b4+b5+b6+w*0.5362)*0.11;
      b6 = w*0.115926;
      // slow swells so it sounds like people, not a fan
      const t = i/sr, ph = ch*1.7;
      const wob = 0.72 + 0.28*Math.sin(t*0.55+ph) * Math.sin(t*0.21+ph*0.5);
      d[i] = pink*wob;
    }
  }
  return buf;
}
function crowdInit(){
  if(!actx || CROWD.on) return;
  const buf = crowdBuffer(6);
  function layer(type, freq, q, gain){
    const s = actx.createBufferSource();
    s.buffer = buf; s.loop = true;
    const f = actx.createBiquadFilter();
    f.type = type; f.frequency.value = freq; if(q) f.Q.value = q;
    const g = actx.createGain(); g.gain.value = gain;
    s.connect(f).connect(g).connect(actx.destination);
    s.start(Math.random()*3);   // offset so the layers don't phase-lock
    return { g:g, f:f };
  }
  const murmur = layer('lowpass', 520, 0.7, 0);
  const roar   = layer('bandpass', 900, 0.6, 0);
  CROWD.murmurG = murmur.g; CROWD.roarG = roar.g; CROWD.roarF = roar.f;
  CROWD.on = true;
}
function crowdBump(v){ CROWD.spike = Math.min(1.5, CROWD.spike + v); }
function crowdTick(raw){
  if(!CROWD.on) return;
  CROWD.spike = Math.max(0, CROWD.spike - raw*0.85);
  let base = 0.16;
  if(state === S.FIGHT) base = 0.26 + Math.min(0.3, G.combo*0.02);
  else if(state === S.REPLAY) base = 0.34;
  else if(state === S.KO || state === S.DOWN) base = 0.75;
  const want = Math.min(1.5, base + CROWD.spike);
  CROWD.level += (want - CROWD.level) * Math.min(1, raw*(want > CROWD.level ? 7 : 1.6));
  const L = CROWD.level;
  // the buffer is already near full scale, so these stay small: a murmur you
  // stop noticing, and a roar that only shows up when they have a reason.
  CROWD.murmurG.gain.value = 0.06 + L*0.07;
  CROWD.roarG.gain.value = Math.max(0, L-0.25) * 0.16;
  CROWD.roarF.frequency.value = 780 + L*900;   // excited crowds get brighter
}

// survival builds men that don't exist: a roster face with the dials turned up
function survivalSpec(n){
  const base = ROSTER[(Math.random()*ROSTER.length)|0];
  const s = Object.assign({}, base);
  s.hp    = Math.round(base.hp * (0.75 + n*0.15));
  s.dmg   = base.dmg * (1 + n*0.055);
  s.speed = Math.min(2.6, base.speed * (1 + n*0.014));
  s.wind  = Math.max(0.13, base.wind * (1 - n*0.035));
  s.aggr  = [Math.max(0.12, base.aggr[0]*(1-n*0.04)), Math.max(0.3, base.aggr[1]*(1-n*0.04))];
  s.flurry = base.flurry + (n >= 6 ? 1 : 0);
  s.rec   = 'BOUT ' + (n+1) + ' · ' + base.style.toUpperCase();
  s.warn  = n === 0 ? base.warn : 'Number ' + (n+1) + '. They are not running out of men.';
  s.tip   = base.tip;
  return s;
}
function specFor(n){
  const m = M();

  if(m.endless) return survivalSpec(n);
  return ROSTER[n % ROSTER.length];
}

function pathPos(f, mv, t, target){
  const sd = sideOf(f, mv);
  const guard = sd === 'L' ? f.guardL : f.guardR;
  const hf = mv.hit;
  let e = t < hf ? Math.pow(t/hf, 0.55) : 1 - Math.pow((t-hf)/(1-hf), 1.5);
  e = clamp(e, 0, 1);
  const p = new V3().copy(guard).lerp(target, e);
  const bulge = Math.sin(e*Math.PI);
  if(mv.arc === 'hook'){ p.x += (sd==='L'?-1:1)*bulge*0.72; p.y += bulge*0.06; }
  else if(mv.arc === 'upper'){ p.y -= bulge*0.50; p.z += bulge*0.30; p.y += e*0.30; }
  else p.y += bulge*0.03;
  return p;
}
// these men are not the same size, so a punch has to aim at the head that's
// actually there. We aim at the CENTRE of it and let resolveContacts stop the
// glove on the skin — guessing a stopping distance here is what leaves gaps.
function punchTarget(f, mv){
  const opp = (f === P) ? F : P;
  const ms = f.group.scale.x || 1;          // thrower's scale
  const os = opp.group.scale.x || 1;        // target's scale
  const worldReach = clamp(gap() - 0.05, 0.55, 1.62 + (f.spec ? f.spec.reach : 0));
  return new V3(
    (sideOf(f, mv) === 'L' ? -0.04 : 0.04) / ms,
    (1.74 * os) / ms,
    -worldReach / ms
  );
}
function throwPunch(f, name, onImpact){
  if(f.stagger > 0 || f.dead) return false;
  // cancel into the next punch once this one has already connected — that's the combo engine
  if(f.punch && !(f.punch.done && f.punch.t > 0.58)) return false;
  const mv = MOVES[name];
  f.punch = { mv:mv, name:name, t:0, done:false, target:punchTarget(f, mv), cb:onImpact };
  return true;
}

function shakeIt(a){ G.trauma = Math.min(1.4, G.trauma + a); }

// ============================================================ resolution
function playerLands(name, blocked, guardBreak){
  if(F.dead || state === S.DOWN) return;
  // THE RULE: damage requires a fist in the air. This is only ever reached
  // from a punch's impact frame, while that punch is still live — so if the
  // hands aren't swinging, nothing here can happen.
  if(!P.punch) return;
  const mv = MOVES[name];
  const hitPos = new V3(); F.head.getWorldPosition(hitPos);

  if(blocked){
    const chip = Math.round(mv.dmg*0.18);
    G.foeHP -= chip;
    burst(hitPos, 8, K.cyan, 3.2); shockRing(hitPos, K.cyan, 0.7);
    dmgNum(hitPos, chip, '#25E5FF', false);
    G.hitstop = 0.05; shakeIt(0.2);
    impactFrames(1, 0x25E5FF, 0x0A0610);
    popStar(hitPos, 0.26, 0x25E5FF, 0.10);
    powText(hitPos, 'block', 26, '#25E5FF');
    POST.uniforms.uAber.value = 0.004;
    sfxBlock(); crowdBump(0.05); haptic(0.12, 0.42, 55, 10); shout('BLOCKED', '#25E5FF'); setBars();
    // counter-punchers don't just absorb it — they answer immediately
    if(AI.sp && AI.sp.punish && AI.phase === 'block'){
      AI.phase = 'idle'; AI.chain = 0; AI.t = 0;
      AI.block = 0; AI.forceAttack = true;   // he answers, he doesn't turtle again
    }
    return;
  }

  const fresh = name !== G.lastPunch;
  G.combo++; G.comboT = 1.25; G.maxCombo = Math.max(G.maxCombo, G.combo); G.landed++;
  let mult = 1 + G.combo*0.075;
  if(!fresh) mult *= 0.55;
  if(SUPER.on) mult *= 1.5;       // the flurry pays, but every shot must land
  if(G.counter > 0){ mult *= 2.5; G.counter = 0; }
  if(guardBreak) mult *= 1.6;

  const dealt = Math.round(mv.dmg * mult * M().dmg);
  G.foeHP = Math.max(0, G.foeHP - dealt);
  G.damage += dealt;
  G.meter = Math.min(G.meterMax, G.meter + dealt*0.55);

  const power = Math.min(1, mv.shake + G.combo*0.03);
  // HIT STOP: everything except the shake and the impact frame stops dead.
  // a jab buys ~0.10s, an uppercut through a guard buys ~0.26s.
  G.hitstop = 0.06 + power*0.14 + (guardBreak?0.06:0);
  shakeIt(0.28 + power*0.55);
  // IMPACT FRAME + the polygon + the noise it makes
  impactFrames(power > 0.75 ? 3 : (power > 0.4 ? 2 : 1),
               guardBreak ? 0x8B3BFF : (power > 0.6 ? 0xFFE03D : 0xFFF6E3), 0x0A0610);
  popStar(hitPos, 0.34 + power*0.62, guardBreak ? 0x8B3BFF : (power > 0.55 ? 0xFF8A1E : 0xFFE03D),
          0.14 + power*0.12);
  if(power > 0.38 || G.combo >= 5){
    powText(hitPos, guardBreak ? 'breaker' : name, 34 + power*46,
            guardBreak ? '#C9B8FF' : '#FFE03D');
  }
  const U = POST.uniforms;
  U.uAber.value = 0.004 + power*0.012;
  U.uZoom.value = 0.03 + power*0.075;
  U.uFlash.value = 0.10 + power*0.28;
  U.uFlashCol.value.setHex(mv.col);
  U.uShock.value = 0.001;
  if(power > 0.7) U.uGlitch.value = 0.6;

  burst(hitPos, 14 + ((power*22)|0), mv.col, 4 + power*7);
  shockRing(hitPos, mv.col, 0.8 + power*1.4);
  bulbStorm(4 + ((power*22)|0));
  dmgNum(hitPos, dealt, guardBreak ? '#8B3BFF' : (fresh ? '#FFE03D' : '#9A9186'), power > 0.7 || G.combo >= 8);
  if(!fresh) dmgNum(hitPos.clone().add(new V3(0.3,0.25,0)), 'SLOPPY', '#6E6459', false);

  // knock him back a step — footwork gets driven by the punch
  const kb = new V3().subVectors(F.pos, P.pos).setY(0).normalize().multiplyScalar(0.09 + power*0.13);
  F.pos.add(kb);
  F.stagger = 0.16 + power*0.14; F.hurt = 1;
  F.head.position.z = -0.02 + (name==='upper' ? 0 : 0.10);
  F.head.position.y = 1.80 + (name==='upper' ? 0.12 : 0);
  F.torso.rotation.x = -0.16*power;

  sfxHit(power);
  haptic(0.22 + power*0.72, 0.35, 80 + power*110, Math.round(14 + power*46));
  crowdBump(0.16 + power*0.42 + Math.min(0.3, G.combo*0.02));
  if(G.combo % 4 === 0) sfxRoar(0.05 + G.combo*0.004);
  if(guardBreak) shout('GUARD BREAK', '#8B3BFF');
  else for(let i=RANKS.length-1;i>=0;i--)
    if(G.combo === RANKS[i].n){ shout(RANKS[i].t+'!', RANKS[i].c); tintPulse(RANKS[i].c, 0.28); break; }

  UI.comboN.textContent = G.combo;
  let rk = 'HIT';
  for(let i=0;i<RANKS.length;i++) if(G.combo >= RANKS[i].n) rk = RANKS[i].t;
  UI.comboR.textContent = rk + ' ×' + mult.toFixed(1);
  UI.combo.style.opacity = 1;
  UI.combo.classList.remove('pop'); void UI.combo.offsetWidth; UI.combo.classList.add('pop');

  G.lastPunch = name; setBars();
  if(G.foeHP <= 0) knockout();
}
function playerWhiffs(msg){
  sfxWhiff();
  G.combo = 0; UI.combo.style.opacity = 0; G.lastPunch = '';
  POST.uniforms.uZoom.value = 0.05;
  if(msg) shout(msg, '#9A9186');
}
function foeLands(dmg){
  if(state !== S.FIGHT) return;
  if(!F.punch) return;            // same rule for him

  const hitPos = new V3(); P.head.getWorldPosition(hitPos);
  if(G.blocking){
    const chip = Math.round(dmg*0.2);
    G.meHP = Math.max(0, G.meHP - chip);
    G.meter = Math.min(G.meterMax, G.meter + 5);
    shakeIt(0.3); G.hitstop = 0.05;
    burst(hitPos, 10, K.cyan, 3.5);
    sfxBlock(); shout('GUARD', '#25E5FF'); tintPulse('#25E5FF', 0.16);
    P.pos.addScaledVector(new V3().subVectors(P.pos, F.pos).setY(0).normalize(), 0.10);
  } else {
    G.meHP = Math.max(0, G.meHP - dmg);
    G.combo = 0; UI.combo.style.opacity = 0; G.lastPunch = '';
    shakeIt(1.0); G.hitstop = 0.13;
    impactFrames(3, 0xFF2D55, 0x0A0610);
    popStar(hitPos, 0.9, 0xFF2D55, 0.2);
    powText(hitPos, 'hurt', 62, '#FF2D55');
    const U = POST.uniforms;
    U.uGlitch.value = 0.9; U.uAber.value = 0.016;
    U.uFlashCol.value.setHex(K.blood); U.uFlash.value = 0.34;
    burst(hitPos, 22, K.blood, 6); tintPulse('#FF2D55', 0.5);
    sfxHit(1); shout('HURT', '#FF2D55'); crowdBump(0.5); haptic(0.95, 0.7, 240, [55,25,45]);
    P.pos.addScaledVector(new V3().subVectors(P.pos, F.pos).setY(0).normalize(), 0.18);
  }
  setBars();
  if(G.meHP <= 0) downed();
}
// one rule covers slipping and stepping out of range
function foeStrikeResolve(name){
  if(state !== S.FIGHT) return;
  const mv = MOVES[name];
  const sp = AI.sp;
  if(gap() > foeRange(name) + 0.06 || G.invuln > 0){
    sfxWhiff();
    // a big man who misses is a big man standing still — that's your window
    AI.t += sp.gas; AI.chain = 0;
    G.counter = 1.1 + sp.gas*0.5; G.slow = 0.4;
    G.meter = Math.min(G.meterMax, G.meter + 12);
    shout('HE MISSED — COUNTER', '#8B3BFF'); crowdBump(0.4);
    tintPulse('#8B3BFF', 0.26);
    POST.uniforms.uZoom.value = 0.08;
    setBars(); return;
  }
  foeLands(Math.round(mv.dmg*0.85*sp.dmg*M().foeDmg));
}

// ============================================================ super
// A flurry is six real punches, thrown through the same pipeline as every
// other punch: same animation, same contact resolve, same impact callback.
// It used to be six setTimeouts that subtracted health while the hands never
// moved. Now if a punch misses, it misses.
const SUPER = { on:false, queue:[] };
const _sv = new V3();
function fireSuper(){
  if(G.meter < G.meterMax || state !== S.FIGHT || SUPER.on) return;
  G.meter = 0;
  SUPER.on = true;
  SUPER.queue = ['jab','cross','hook','jab','cross','upper'];   // varied: no SLOPPY penalty
  G.slow = 0.8;                       // a beat of slow-mo, then let it rip
  shout('FLURRY', '#FFE03D'); tintPulse('#8B3BFF', 0.6);
  sfxRoar(0.22); crowdBump(0.9); haptic(0.5, 0.85, 420, [26,18,26,18,26,18,60]);
  POST.uniforms.uFlash.value = 0.4;
  POST.uniforms.uFlashCol.value.setHex(K.violet);
  setBars();
}
function superTick(dt){
  if(!SUPER.on) return;
  if(state !== S.FIGHT || P.dead){ SUPER.on = false; SUPER.queue.length = 0; return; }
  if(SUPER.queue.length === 0 && !P.punch){ SUPER.on = false; return; }

  // walk him down — you can't unload on a man who isn't there
  const d = gap();
  if(d > 1.45){
    _sv.subVectors(F.pos, P.pos).setY(0);
    if(_sv.lengthSq() > 1e-8){
      _sv.normalize();
      P.pos.addScaledVector(_sv, Math.min(2.8*dt, d - 1.45));
    }
  }
  // next punch goes the instant the last one is cancellable — but not until
  // he's actually in front of you. swinging at air is honest, it just isn't
  // what you spent a full meter on.
  if(SUPER.queue.length && d <= 1.72 && (!P.punch || (P.punch.done && P.punch.t > 0.5))){
    const nm = SUPER.queue[0];
    if(throwPunch(P, nm, function(){ punchImpact(nm); })){
      SUPER.queue.shift();
      POST.uniforms.uFlashCol.value.setHex(SUPER.queue.length % 2 ? K.lemon : K.violet);
    }
  }
}

// ============================================================ endings
function knockout(){
  if(state === S.KO || state === S.REPLAY) return;
  state = S.KO; F.dead = true; G.slow = 2.2;
  SUPER.on = false; SUPER.queue.length = 0;
  REC.koFrame = REC.count;              // this exact frame is the money shot
  buildRagdoll(F);
  _koDir.subVectors(F.pos, P.pos).setY(0).normalize();
  ragImpulse(F, _koDir, 1.0);
  const U = POST.uniforms;
  U.uFlash.value = 1.0; U.uFlashCol.value.setHex(0xFFFFFF); U.uShock.value = 0.001;
  shakeIt(1.4); bulbStorm(70);
  impactFrames(5, 0xFFF6E3, 0x0A0610);
  const _kp = new V3(); F.head.getWorldPosition(_kp);
  popStar(_kp, 1.5, 0xFFE03D, 0.5);
  powText(_kp, 'upper', 92, '#FFE03D');
  sfxRoar(0.3); crowdBump(1.5); haptic(1, 1, 750, [45,35,70,35,180]); tone(90, 30, 1.2, 'sawtooth', 0.2);
  shout('K.O.', '#FFE03D'); UI.shout.style.fontSize = '104px';
  // let it land live for a beat, then roll the tape
  setTimeout(function(){ startReplay(F, P, nextBout); }, 2000);
}
function downed(){
  if(state === S.DOWN || state === S.REPLAY) return;
  state = S.DOWN; G.slow = 2.0; P.dead = true;
  REC.koFrame = REC.count;
  buildRagdoll(P);
  _koDir.subVectors(P.pos, F.pos).setY(0).normalize();
  ragImpulse(P, _koDir, 1.0);
  POST.uniforms.uFlash.value = 0.8; POST.uniforms.uFlashCol.value.setHex(K.blood);
  shakeIt(1.2); tintPulse('#FF2D55', 0.85); shout('DOWN', '#FF2D55');
  setTimeout(function(){
    RUN.totalDmg += G.damage; G.damage = 0;
    RUN.bestCombo = Math.max(RUN.bestCombo, G.maxCombo);
    startReplay(P, F, lostCard);   // you get to watch it too
  }, 2000);
}

// ============================================================ opponent
const AI = { t:1.2, phase:'idle', wind:0, punchName:'', block:0, circle:1, circleT:0,
             want:1.8, chain:0, sp:null, stepIn:0, forceAttack:false };
// his reach advantage applies to his punches, not yours
function foeRange(name){ return MOVES[name].range + (AI.sp ? AI.sp.reach : 0); }

function aiUpdate(dt){
  if(F.dead || !AI.sp) return;
  const sp = AI.sp;
  const rush = 1 - G.foeHP/G.foeMax;
  const d = gap();
  AI.t -= dt;
  AI.circleT -= dt;
  if(AI.circleT <= 0){ AI.circle = Math.random() < 0.5 ? -1 : 1; AI.circleT = 0.9 + Math.random()*1.8; }

  // the champion stops boxing once he's hurt — his want/aggression collapse inward
  let want = sp.want, aggrLo = sp.aggr[0], aggrHi = sp.aggr[1], flurry = sp.flurry, spd = sp.speed;
  if(sp.style === 'Champion' && rush > 0.4){
    const k = (rush - 0.4) / 0.6;
    want -= k*0.75; aggrLo *= 1 - k*0.5; aggrHi *= 1 - k*0.55;
    flurry += k > 0.5 ? 1 : 0; spd += k*0.35;
  }

  if(F.stagger > 0){ AI.t = Math.max(AI.t, 0.3); AI.phase = 'idle'; AI.chain = 0; }
  else if(AI.phase === 'idle' && AI.t <= 0){
    if(AI.chain > 0){                       // mid-flurry: no thinking, just throw
      AI.punchName = sp.moves[(Math.random()*sp.moves.length)|0];
      AI.phase = 'wind'; AI.wind = sp.wind*0.45; AI.t = AI.wind; AI.chain--;
    }
    else if(Math.random() < sp.block && !AI.forceAttack){
      AI.phase = 'block'; AI.block = 0.4 + Math.random()*0.5; AI.t = AI.block + 0.12;
    }
    else {
      AI.forceAttack = false;
      AI.punchName = sp.moves[(Math.random()*sp.moves.length)|0];
      if(d <= foeRange(AI.punchName) - 0.05){
        AI.phase = 'wind'; AI.wind = sp.wind*(0.85 + Math.random()*0.3); AI.t = AI.wind;
        AI.chain = flurry; AI.stepIn = 0;
      } else {
        // he's picked a shot he can't reach — step in for it, then re-check.
        // without this an out-boxer whose reach is shorter than his preferred
        // range would circle forever and never throw a punch.
        AI.stepIn = foeRange(AI.punchName) - 0.20;
        AI.t = 0.1;
      }
    }
  }
  else if(AI.phase === 'wind' && AI.t <= 0){
    const nm = AI.punchName;
    throwPunch(F, nm, function(){ foeStrikeResolve(nm); });
    AI.phase = 'recover';
    AI.t = MOVES[nm].dur + (AI.chain > 0 ? 0.05 : aggrLo + Math.random()*(aggrHi-aggrLo));
  }
  else if((AI.phase === 'block' || AI.phase === 'recover') && AI.t <= 0){
    AI.phase = 'idle';
    AI.t = AI.chain > 0 ? 0 : (aggrLo*0.4 + Math.random()*aggrHi*0.5);
  }

  // ---- footwork: the range he wants depends on what he's doing ----
  if(AI.phase === 'wind') AI.want = Math.min(want, 1.55);
  else if(AI.phase === 'recover'){ AI.want = want + (sp.style === 'Swarmer' ? 0 : 0.35); AI.stepIn = 0; }
  else if(AI.stepIn) AI.want = Math.min(want, AI.stepIn);   // closing for a shot
  else AI.want = want;
  spd *= (AI.phase === 'recover' ? 0.85 : 1) * (1 + rush*0.15);
  const toP = new V3().subVectors(P.pos, F.pos).setY(0);
  const dd = Math.max(toP.length(), 0.001);
  toP.divideScalar(dd);
  const side = new V3(-toP.z, 0, toP.x);
  const closing = clamp(dd - AI.want, -1, 1);
  const vel = new V3()
    .addScaledVector(toP, closing * spd)
    .addScaledVector(side, AI.circle * spd * sp.circle);
  F.pos.addScaledVector(vel, dt);
  return vel.lengthSq() > 0.04;
}
const foeBlocking = () => AI.phase === 'block' && AI.block > 0;

// ============================================================ platform
const OPT = { vibe:true, rumble:true, squish:1 };
const PWA = { prompt:null };
const IS_IOS = /iphone|ipad|ipod/i.test(navigator.userAgent) ||
               (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
const STANDALONE = !!navigator.standalone || matchMedia('(display-mode: standalone)').matches
                   || matchMedia('(display-mode: fullscreen)').matches;

// one call site for every kind of buzz: pad motors and the phone itself
function haptic(strong, weak, ms, pattern){

    try{ navigator.vibrate(pattern || Math.round(ms*0.45)); }catch(e){}
  }
}
function applySquish(){

    f.dHead.max = SQUISH.headMax * OPT.squish;

// ============================================================ gamepad
// Standard mapping (Xbox): triggers slip, bumpers block, face buttons punch.
// Triggers are analog, so they're thresholded and edge-detected — a slip is a
// discrete act, not something you hold.
const PAD = {
  idx:null, prev:{}, dead:0.22, on:false,
  BTN:{ A:0, B:1, X:2, Y:3, LB:4, RB:5, LT:6, RT:7, BACK:8, START:9,
        L3:10, R3:11, UP:12, DOWN:13, LEFT:14, RIGHT:15 }
};
const pmove = { x:0, z:0 };
const BLOCK = { key:false, touch:false, pad:false };   // any source can hold the guard

addEventListener('gamepadconnected', function(e){
  PAD.idx = e.gamepad.index; PAD.on = true;
  document.body.classList.add('pad');
  toast('Controller ready · LT/RT slip · LB/RB block');
});
addEventListener('gamepaddisconnected', function(e){
  if(PAD.idx === e.gamepad.index){ PAD.idx = null; PAD.on = false; PAD.prev = {}; }
  pmove.x = pmove.z = 0; BLOCK.pad = false;
  document.body.classList.remove('pad');
});
function padGet(){
  const pads = navigator.getGamepads ? navigator.getGamepads() : null;
  if(!pads) return null;
  if(PAD.idx !== null && pads[PAD.idx] && pads[PAD.idx].connected) return pads[PAD.idx];
  for(let i=0;i<pads.length;i++){
    if(pads[i] && pads[i].connected){ PAD.idx = i; return pads[i]; }
  }
  return null;
}
function padDown(gp, i, thresh){
  const b = gp.buttons[i];
  if(b === undefined) return false;
  if(typeof b === 'object') return b.value > thresh || (b.pressed && b.value === 0);
  return b > thresh;
}
function padRumble(strong, weak, ms){
  const gp = padGet();
  if(!gp) return;
  const act = gp.vibrationActuator;
  if(!act || !act.playEffect) return;
  try{
    act.playEffect('dual-rumble', {
      startDelay:0, duration:ms,
      strongMagnitude:clamp(strong,0,1), weakMagnitude:clamp(weak,0,1)
    });
  }catch(e){}
}
function padTick(){
  const gp = padGet();
  if(!gp){ pmove.x = pmove.z = 0; BLOCK.pad = false; return; }
  if(!PAD.on){ PAD.on = true; document.body.classList.add('pad'); }
  const B = PAD.BTN, down = {};
  for(const k in B){
    // triggers pull long and lazy, so they trip early
    down[k] = padDown(gp, B[k], (k === 'LT' || k === 'RT') ? 0.4 : 0.5);
  }
  const hit = function(k){ return down[k] && !PAD.prev[k]; };
  let any = false;
  for(const k in down) if(down[k] && !PAD.prev[k]) any = true;

  if(state === S.REPLAY){
    if(any) endReplay();
  } else if(paused){
    if(hit('START') || hit('B')) togglePause(false);
    if(hit('DOWN') || hit('RIGHT')) cardNav(1);
    if(hit('UP') || hit('LEFT')) cardNav(-1);
  } else if(state !== S.FIGHT){
    if(hit('DOWN') || hit('RIGHT')) cardNav(1);
    if(hit('UP') || hit('LEFT')) cardNav(-1);
    if(hit('A') || hit('START')){
      const a = document.activeElement;
      if(a && a.click && a.closest && a.closest('#veil')) a.click();
      else if(UI.go) UI.go.click();
    }
  } else if(hit('START')){
    togglePause(true);
  } else {
    if(hit('X')) tryPunch('jab');
    if(hit('Y')) tryPunch('cross');
    if(hit('A')) tryPunch('hook');
    if(hit('B')) tryPunch('upper');
    if(hit('LT')) slip(-1);
    if(hit('RT')) slip(1);
    if(hit('R3') || hit('BACK')) fireSuper();
  }
  BLOCK.pad = !!(down.LB || down.RB);

  // left stick, radial deadzone, rescaled so it eases in from a standstill
  let ax = gp.axes[0] || 0, ay = gp.axes[1] || 0;
  const m = Math.hypot(ax, ay);
  if(m < PAD.dead){ ax = ay = 0; }
  else {
    const s = ((m - PAD.dead) / (1 - PAD.dead)) / m;
    ax *= s; ay *= s;
  }
  if(down.LEFT) ax -= 1; if(down.RIGHT) ax += 1;
  if(down.UP)   ay -= 1; if(down.DOWN)  ay += 1;
  pmove.x = clamp(ax, -1, 1);
  pmove.z = clamp(-ay, -1, 1);    // stick up = forward = at him

  PAD.prev = down;
}
function toast(msg){
  const t = el('toast');
  t.textContent = msg;
  t.classList.add('on');
  clearTimeout(toast._t);
  toast._t = setTimeout(function(){ t.classList.remove('on'); }, 2600);
}

// ============================================================ input
const keys = {};
const move = { x:0, z:0 };     // -1..1, relative to facing
// The ONLY door damage comes through. It is called from a punch's impact
// frame and nowhere else — see the guard at the top of playerLands.
function punchImpact(name){
  const mv = MOVES[name];
  G.thrown++;
  if(gap() > mv.range){ playerWhiffs('TOO FAR'); return; }
  if(AI.phase === 'wind' && Math.random() < 0.08){ playerWhiffs('SLIPPED'); return; }
  playerLands(name, foeBlocking() && !mv.breaks, foeBlocking() && !!mv.breaks);
}
function tryPunch(name){
  if(state !== S.FIGHT || SUPER.on) return;      // during a flurry the queue has the hands
  const ok = throwPunch(P, name, function(){ punchImpact(name); });
  if(ok) audioInit();
}
function slip(dir){
  if(state !== S.FIGHT || G.weave > 0) return;
  G.weave = 0.42; G.weaveDir = dir; G.invuln = 0.30;
  if(F.punch && !F.punch.done){
    G.counter = 1.1; G.slow = 0.45;
    G.meter = Math.min(G.meterMax, G.meter + 14);
    shout('SLIP! COUNTER', '#8B3BFF'); tintPulse('#8B3BFF', 0.32);
    POST.uniforms.uZoom.value = 0.09; setBars();
  }
  tone(600, 300, 0.09, 'triangle', 0.03);
  haptic(0, 0.3, 60, 8);
}
addEventListener('keydown', function(e){
  if(keys[e.code]) return;
  keys[e.code] = true;
  // during a replay any key bails out — checked first, or Space would reach
  // through and press the button on the card hiding behind it
  if(state === S.REPLAY){ e.preventDefault(); endReplay(); return; }
  if(e.code === 'Escape'){ e.preventDefault(); togglePause(); return; }
  if(paused) return;
  // whatever the card is offering, Space/Enter takes it — unless the player has
  // tabbed onto a button, in which case the browser already knows what to do
  if(state !== S.FIGHT && (e.code==='Space'||e.code==='Enter')){
    const a = document.activeElement;
    if(a && a.tagName === 'BUTTON' && a.closest('#veil')) return;
    e.preventDefault(); if(UI.go) UI.go.click(); return;
  }
  switch(e.code){
    case 'KeyJ': tryPunch('jab'); break;
    case 'KeyK': tryPunch('cross'); break;
    case 'KeyL': tryPunch('hook'); break;
    case 'KeyI': tryPunch('upper'); break;
    case 'KeyQ': slip(-1); break;
    case 'KeyE': slip(1); break;
    case 'KeyF': fireSuper(); break;
    case 'Space': e.preventDefault(); BLOCK.key = true; break;
  }
});
addEventListener('keyup', function(e){
  keys[e.code] = false;
  if(e.code === 'Space') BLOCK.key = false;
});
const smove = { x:0, z:0 };    // stick, written by the touch handlers
function readKeys(){
  let x = 0, z = 0;
  if(keys['KeyW'] || keys['ArrowUp'])    z += 1;
  if(keys['KeyS'] || keys['ArrowDown'])  z -= 1;
  if(keys['KeyD'] || keys['ArrowRight']) x += 1;
  if(keys['KeyA'] || keys['ArrowLeft'])  x -= 1;
  if(x || z){ const m = Math.hypot(x,z); x /= m; z /= m; }
  // keys, thumbstick and gamepad coexist; none of them erases the others
  move.x = clamp(x + smove.x + pmove.x, -1, 1);
  move.z = clamp(z + smove.z + pmove.z, -1, 1);
  G.blocking = BLOCK.key || BLOCK.touch || BLOCK.pad;
}

// touch
function hold(id, on, off){
  const b = el(id);
  b.addEventListener('pointerdown', function(e){ e.preventDefault(); on(); });
  if(off){ b.addEventListener('pointerup', off); b.addEventListener('pointerleave', off); }
}

hold('bCross', () => tryPunch('cross'));

// screen space -> app space: the app itself is CSS-rotated 90deg on portrait
// phones to fake a landscape lock, so a raw clientX/clientY doesn't line up
// with anything drawn inside it. Both the stick and the slip swipe need the
// touch point translated into the app's own unrotated coordinate box.
function appPoint(px, py){
  if(!rotated) return { x:px, y:py };
  const cx = innerWidth/2, cy = innerHeight/2;
  return { x: VW/2 + (py - cy), y: VH/2 - (px - cx) };
}

// slip is a swipe on the punching hand's side, not a dedicated button — swipe
// left to slip left, right to slip right, anywhere over on that half.
const SLIP = { id:null, x0:0, y0:0, fired:false };
const SLIP_DIST = 32;
el('pad').addEventListener('pointerdown', function(e){
  if(appPoint(e.clientX, e.clientY).x < VW/2) return;   // footwork hand doesn't slip
  SLIP.id = e.pointerId; SLIP.x0 = e.clientX; SLIP.y0 = e.clientY; SLIP.fired = false;
});
addEventListener('pointermove', function(e){
  if(e.pointerId !== SLIP.id || SLIP.fired) return;
  let dx = e.clientX - SLIP.x0, dy = e.clientY - SLIP.y0;
  if(rotated){ const t = dx; dx = dy; dy = -t; }
  if(Math.abs(dx) > SLIP_DIST && Math.abs(dx) > Math.abs(dy)){
    slip(dx > 0 ? 1 : -1); SLIP.fired = true;
  }
});
addEventListener('pointerup', function(e){ if(e.pointerId === SLIP.id) SLIP.id = null; });

// stick — a floating base that recentres on wherever the thumb lands, then
// eases back home on release. Deltas (and the touch point itself) get
// un-rotated by hand when the app is CSS-rotated.
const nub = el('nub'), stick = el('stick');
const STICK_HOME = { x:34+50, y:0 };           // y filled in once VH is known (below)
let stickId = null, sx0 = 0, sy0 = 0;
el('stickZone').addEventListener('pointerdown', function(e){
  e.preventDefault(); stickId = e.pointerId; sx0 = e.clientX; sy0 = e.clientY;
  STICK_HOME.y = VH - 30 - 50;
  const p = appPoint(e.clientX, e.clientY);
  const cx = clamp(p.x, 50, 90), cy = clamp(p.y, VH-100, VH-50);
  stick.classList.add('dragging');
  stick.style.transform = 'translate(' + (cx-STICK_HOME.x) + 'px,' + (cy-STICK_HOME.y) + 'px)';
});
addEventListener('pointermove', function(e){
  if(e.pointerId !== stickId) return;
  let dx = e.clientX - sx0, dy = e.clientY - sy0;
  if(rotated){ const t = dx; dx = dy; dy = -t; }   // screen space -> app space
  const R = 42, m = Math.hypot(dx,dy);
  if(m > R){ dx = dx/m*R; dy = dy/m*R; }
  nub.style.transform = 'translate(' + dx + 'px,' + dy + 'px)';
  smove.x = dx/R; smove.z = -dy/R;
});
addEventListener('pointerup', function(e){
  if(e.pointerId !== stickId) return;
  stickId = null; smove.x = 0; smove.z = 0;
  nub.style.transform = '';
  stick.classList.remove('dragging');
  stick.style.transform = '';
});
